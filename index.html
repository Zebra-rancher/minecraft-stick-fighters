// ===== COMBAT RESOLUTION =====
function checkAttackHit(attacker,defender){
  if(attacker.state!=='attack'||attacker.attackPhase!=='active')return;
  if(defender.invincible>0)return;
  const atk=attacker.currentAttack;if(!atk||atk._hit)return;
  const dx=defender.x-attacker.x,dy=defender.y-attacker.y,dist=Math.sqrt(dx*dx+dy*dy);
  const inFront=dx*attacker.facing>-20;

  // projectile spawning
  if(atk.projectile&&!atk._projSpawned){
    const spd=atk.projSpeed||8;
    let pvx=attacker.facing*spd,pvy=atk.projAngle?atk.projAngle*spd:-0.5;
    const pc=atk.projColor||attacker.def.color;
    if(atk.multiShot){
      for(let i=0;i<atk.multiShot;i++){projectiles.push(new Projectile(attacker.x+attacker.facing*20,attacker.y-30+i*12,pvx,pvy+i*0.5-0.5,atk.dmg*0.6*attacker.strengthMult,atk.kb*0.5,attacker,pc,atk.explosive))}
    }else{
      projectiles.push(new Projectile(attacker.x+attacker.facing*20,attacker.y-30,pvx,pvy,atk.dmg*attacker.strengthMult,atk.kb,attacker,pc,atk.explosive));
    }
    atk._projSpawned=true;atk._hit=true;return;
  }

  // fishing rod grab
  if(atk.grab&&!atk._projSpawned){
    attacker.fishingLine={x:attacker.x+attacker.facing*20,y:attacker.y-30,vx:attacker.facing*10,vy:-3,life:30};
    sfxGrab();atk._projSpawned=true;atk._hit=true;return;
  }

  // grapple (aerial fishing rod)
  if(atk.grapple&&!atk._projSpawned){
    attacker.fishingLine={x:attacker.x,y:attacker.y,vx:attacker.facing*6,vy:8,life:25};
    sfxGrab();atk._projSpawned=true;atk._hit=true;return;
  }

  // riptide
  if(atk.riptide&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.3;attacker.vx=attacker.facing*4;
    spawnParticles(attacker.x,attacker.y,'#5DE8E0',10,3);atk._projSpawned=true;
  }

  // elytra launch
  if(atk.elytraLaunch&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.5;attacker.gliding=true;
    spawnParticles(attacker.x,attacker.y,'#9B59B6',8,3);atk._projSpawned=true;sfxJump();
  }

  // elytra dive punch
  if(atk.elytraDive&&!atk._projSpawned){
    attacker.vx=attacker.facing*12;attacker.vy=-2;
    spawnParticles(attacker.x,attacker.y,'#AA66CC',6,4);atk._projSpawned=true;
  }

  // firework boost
  if(atk.fireworkBoost&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.8;attacker.gliding=true;
    attacker.effectTimers.fireworkBoost=180;
    spawnParticles(attacker.x,attacker.y+10,'#FF0',15,5);
    sfxExplode();atk._projSpawned=true;atk._hit=true;return;
  }

  // teleport up (Second Coming)
  if(atk.teleportUp&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.5;
    spawnParticles(attacker.x,attacker.y,'#9B59B6',12,3);atk._projSpawned=true;
  }

  // command teleport
  if(atk.commandTP&&!atk._projSpawned&&defender){
    attacker.x=defender.x-attacker.facing*40;
    spawnParticles(attacker.x,attacker.y-20,'#FFD700',15,5);atk._projSpawned=true;
  }

  // totem of undying
  if(atk.totem&&!atk._projSpawned){
    attacker.totemActive=true;attacker.totemTimer=120;
    spawnParticles(attacker.x,attacker.y-20,'#FFD700',20,4);
    playSound(800,0.2,'sine',0.15);atk._projSpawned=true;atk._hit=true;return;
  }

  // rage mode
  if(atk.rage&&!atk._projSpawned){
    attacker.hp-=atk.selfDmg;attacker.rageActive=true;attacker.strengthMult=2;
    attacker.effectTimers.rage=300;
    spawnParticles(attacker.x,attacker.y-20,'#FF4444',15,5);
    playSound(150,0.3,'sawtooth',0.2);atk._projSpawned=true;atk._hit=true;return;
  }

  // potion attacks (Blue)
  if(atk.potion&&!atk._projSpawned){
    const potions=['slowness','weakness','harming','poison'];
    const potType=potions[attacker.potionIndex%potions.length];
    attacker.potionIndex++;
    const potColors={slowness:'#4488FF',weakness:'#888888',harming:'#AA44FF',poison:'#44AA44'};
    spawnParticles(attacker.x+attacker.facing*30,attacker.y-20,potColors[potType],12,3);
    // apply to nearby opponent
    if(defender&&dist<atk.range){
      if(potType==='slowness'){defender.speedMult=0.5;defender.effectTimers.slow=180}
      if(potType==='weakness'){defender.strengthMult=0.6;defender.effectTimers.weak=180}
      if(potType==='harming'){defender.takeDamage(12,attacker.facing*3,-2,attacker)}
      if(potType==='poison'){defender.effectTimers.poison=240}
    }
    atk._projSpawned=true;atk._hit=true;return;
  }
  if(atk.poison&&!atk._projSpawned){
    if(defender&&dist<atk.range){defender.effectTimers.poison=300;spawnParticles(defender.x,defender.y-20,'#44AA44',10,3)}
    atk._projSpawned=true;atk._hit=true;return;
  }

  // levitate (King Orange)
  if(atk.levitate&&dist<atk.range&&inFront&&!atk._hit){
    defender.vy=-10;defender.hitstunTimer=20;defender.state='hitstun';
    spawnParticles(defender.x,defender.y-20,'#FFD700',8,3);atk._hit=true;return;
  }

  // lightning (Green special / King Orange)
  if(atk.lightning&&!atk._projSpawned){
    if(defender){
      const lx=defender.x;
      ctx.strokeStyle='#FFE44D';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx+Math.random()*20-10,H*0.3);ctx.lineTo(lx+Math.random()*20-10,H*0.6);ctx.lineTo(lx,defender.y);ctx.stroke();
      defender.takeDamage(atk.dmg*attacker.strengthMult,0,-8,attacker);
      sfxLightning();spawnParticles(lx,defender.y-20,'#FFE44D',15,5);shake(10);
    }
    atk._projSpawned=true;atk._hit=true;return;
  }

  // plant bomb (Yellow)
  if(atk.plantBomb&&!atk._projSpawned){
    plantedBombs.push(new PlantedBomb(attacker.x,attacker.y,attacker,180,70,18));
    atk._projSpawned=true;atk._hit=true;return;
  }

  // end crystal (Yellow)
  if(atk.endCrystal&&!atk._projSpawned){
    plantedBombs.push(new PlantedBomb(attacker.x,attacker.y+20,attacker,120,90,22));
    spawnParticles(attacker.x,attacker.y,'#FF69FF',8,3);atk._projSpawned=true;atk._hit=true;return;
  }

  // chain TNT (Yellow special)
  if(atk.chainTNT&&!atk._projSpawned){
    for(let i=0;i<3;i++){plantedBombs.push(new PlantedBomb(attacker.x+attacker.facing*(i*40),attacker.y,attacker,60+i*40,60,15))}
    atk._projSpawned=true;atk._hit=true;return;
  }

  // self launch
  if(atk.selfLaunch&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.3;if(atk.selfDmg)attacker.hp-=atk.selfDmg;
    sfxExplode();spawnParticles(attacker.x,attacker.y,'#FF4444',10,4);atk._projSpawned=true;
  }

  // explosive melee
  if(atk.explosive&&!atk.projectile&&!atk._projSpawned){
    spawnParticles(attacker.x+attacker.facing*30,attacker.y-20,'#FF4444',15,5);
    sfxExplode();shake(6);atk._projSpawned=true;
  }

  // charge attack
  if(atk.charge&&!atk._projSpawned){attacker.vx=attacker.facing*8;atk._projSpawned=true}

  // shockwave
  if(atk.shockwave&&!atk._projSpawned){
    spawnParticles(attacker.x,attacker.y,'#AAA',12,4);shake(5);atk._projSpawned=true;
  }

  // normal melee hit
  if(dist<atk.range&&(inFront||dist<30)){
    const dmg=atk.dmg*attacker.strengthMult;
    if(attacker.effectTimers.fireworkBoost>0)dmg*2; // Purple firework boost doubles next aerial
    let kbx=attacker.facing*atk.kb*0.8,kby=-atk.kb*0.5;
    if(atk.name&&(atk.name.includes('Upper')||atk.name.includes('Launch')||atk.name.includes('Sky')||atk.name.includes('Rising'))){kby=-atk.kb;kbx=attacker.facing*2}
    if(atk.name&&(atk.name.includes('Slam')||atk.name.includes('Drop')||atk.name.includes('Meteor')||atk.name.includes('Down')||atk.name.includes('Ground'))){kby=atk.kb*0.3;kbx=attacker.facing*atk.kb*0.5}

    const finalDmg=attacker.effectTimers.fireworkBoost>0&&!attacker.grounded?dmg*2:dmg;
    defender.takeDamage(finalDmg,kbx,kby,attacker);
    if(attacker.effectTimers.fireworkBoost>0&&!attacker.grounded)attacker.effectTimers.fireworkBoost=0;
    atk._hit=true;

    // combo tracking (all hits count now)
    if(attacker.comboTimer>0)attacker.combo++;else attacker.combo=1;
    attacker.comboTimer=45;

    // element-specific hit particles
    if(attacker.id==='chosen_one')spawnSparks(defender.x,defender.y-20,'#FF4400',6);
    else if(attacker.id==='dark_lord')spawnSparks(defender.x,defender.y-20,'#CC0000',5);
    else if(attacker.id==='hacker')spawnSparks(defender.x,defender.y-20,'#00FF00',5);
    else if(attacker.id==='the_mouse')spawnSparks(defender.x,defender.y-20,'#FFFFFF',4);
    else if(atk.explosive||atk.endCrystal)spawnSparks(defender.x,defender.y-20,'#FF6600',8);
    else if(atk.lightning)spawnSparks(defender.x,defender.y-20,'#FFE44D',8);

    // combo bonus: increasing knockback for long combos
    if(attacker.combo>=3){
      const comboBonus=Math.min(attacker.combo*0.1,0.5);
      defender.vx*=(1+comboBonus);defender.vy*=(1+comboBonus);
    }

    if(atk.selfDmg){attacker.hp-=atk.selfDmg;spawnParticles(attacker.x,attacker.y-20,'#FF4444',6,3)}
  }
}

// ===== START FIGHT =====
function startFight(p1Char,p2Char,stageIdx,p2IsCPU=true,cpuDiff=0.5){
  const allStages=gameMode==='training'?[TRAINING_STAGE,...STAGE_DEFS]:STAGE_DEFS;
  const stage=allStages[stageIdx%allStages.length];currentStage=stage;
  const sx1=stage.platforms[0].x+80,sx2=stage.platforms[0].x+stage.platforms[0].w-80;
  fighters=[new Fighter(p1Char,sx1,1,1),new Fighter(p2Char,sx2,-1,2)];
  fighters[1].ai=p2IsCPU?new AIController(cpuDiff):null;
  projectiles=[];activeItems=[];particles=[];plantedBombs=[];stageHazards=[];
  dmgNumbers=[];trails=[];sparks=[];speedLines=[];smoothHP=[100,100];hitstopFrames=0;flashAlpha=0;
  dashState=[{dir:0,timer:0,dashing:false},{dir:0,timer:0,dashing:false}];
  hazardTimer=180+Math.floor(Math.random()*120);
  smashBall=null;smashBallTimer=300+Math.random()*180;finalSmashActive=false;finalSmashData=null;
  roundTimer=5400;itemSpawnTimer=300;countdownTimer=180;gameState=S.FIGHTING;
}

// ===== FIGHTER INPUT =====
function handleFighterInput(f,up,down,left,right,attack,bonusAttack){
  if(f.state==='hitstun'||f.state==='dead'||countdownTimer>0)return;
  const pIdx=f.playerNum-1;
  const isDash=handleDash(pIdx,left,right);

  if(f.state!=='attack'){
    if(left){f.vx=-f.def.speed*f.speedMult;f.state=f.grounded?'walk':'jump'}
    else if(right){f.vx=f.def.speed*f.speedMult;f.state=f.grounded?'walk':'jump'}
    else if(f.grounded&&f.state!=='attack')f.state='idle';
  }
  // Dash: burst of speed + trail
  if(isDash&&f.state!=='attack'&&f.grounded){
    f.vx=f.facing*f.def.speed*2.5;
    spawnTrail(f.x,f.y,f.def.color,12,45,0.25);
    playSound(500,0.06,'sine',0.08);
  }
  if(up&&f.jumpCount<f.jumps&&f.state!=='attack'){if(!f._jumpHeld){f.vy=-f.def.jumpForce;f.grounded=false;f.jumpCount++;f.state='jump';sfxJump();f._jumpHeld=true}}
  if(!up)f._jumpHeld=false;
  // elytra glide
  if(f.def.passive==='elytra'&&up&&!f.grounded&&f.jumpCount>=f.jumps)f.gliding=true;
  if(!up)f.gliding=false;
  if(down&&!f.grounded)f.vy=Math.min(f.vy+1,12);
  // Bonus attack (M/R key)
  if(bonusAttack&&!f._bonusHeld&&saveData.bonusUnlocked.includes(f.id)){
    f.startAttack('bonus');f._bonusHeld=true;
  }
  if(!bonusAttack)f._bonusHeld=false;
  if(attack&&!f._attackHeld){
    // Final Smash trigger: neutral attack (no direction) when hasSmash
    if(f.hasSmash&&!up&&!down&&!left&&!right){
      const opp=fighters.find(o=>o!==f);if(opp)triggerFinalSmash(f,opp);
    }else{
      let dir='neutral';if(up)dir='up';else if(down)dir='down';else if(left||right)dir='forward';
      // Dash attack: if currently dashing, boost the attack
      if(dashState[pIdx].dashing&&f.grounded&&dir==='forward'){
        f.vx=f.facing*f.def.speed*2;// lunge forward
        spawnTrail(f.x,f.y,f.def.color,14,45,0.3);
      }
      f.startAttack(dir);
    }
    f._attackHeld=true;
  }
  if(!attack)f._attackHeld=false;
}

// ===== MAIN UPDATE =====
function update(){
  if(gameState===S.MINIGAME){updateMinigame();return}
  // Always update visual effects even during hitstop
  updateDmgNumbers();updateTrails();updateSparks();updateSmoothHP();
  if(gameState===S.FIGHTING){
    if(countdownTimer>0){countdownTimer--;return}
    // Hitstop: freeze gameplay but not visual effects
    if(hitstopFrames>0){hitstopFrames--;return}

    // Final Smash cinematic freeze - skip normal updates during cinematic
    if(finalSmashActive){
      updateFinalSmash();updateParticles();
      // still update projectiles spawned by Final Smash
      for(let i=projectiles.length-1;i>=0;i--){
        const p=projectiles[i];p.update();
        if(p.life<=0||p.x<-50||p.x>W+50||p.y>H+50){projectiles.splice(i,1);continue}
        fighters.forEach(f=>{
          if(f!==p.owner&&f.invincible<=0&&Math.abs(p.x-f.x)<20&&Math.abs(p.y-(f.y-25))<30){
            if(p.explosive){sfxExplode();shake(6);spawnParticles(p.x,p.y,'#FF4444',12,5);
              fighters.forEach(ff=>{if(Math.abs(ff.x-p.x)<60&&Math.abs(ff.y-p.y)<50)ff.takeDamage(p.dmg,(ff.x-p.x)*0.3,-5,p.owner)});
            }else{f.takeDamage(p.dmg,p.vx*0.5,-3,p.owner)}
            projectiles.splice(i,1);
          }
        });
      }
      if(shakeTime>0)shakeTime--;else shakeAmount=0;
      return;
    }

    roundTimer--;
    handleFighterInput(fighters[0],keys['ArrowUp'],keys['ArrowDown'],keys['ArrowLeft'],keys['ArrowRight'],keys['Space'],keys['KeyM']);
    if(fighters[1].ai)fighters[1].ai.update(fighters[1],fighters[0],currentStage.platforms);
    else handleFighterInput(fighters[1],keys['KeyW'],keys['KeyS'],keys['KeyA'],keys['KeyD'],keys['KeyE'],keys['KeyR']);
    fighters.forEach((f,i)=>f.update(currentStage.platforms,fighters[1-i],currentStage));
    checkAttackHit(fighters[0],fighters[1]);checkAttackHit(fighters[1],fighters[0]);

    // projectiles
    for(let i=projectiles.length-1;i>=0;i--){
      const p=projectiles[i];p.update();
      if(p.life<=0||p.x<-50||p.x>W+50||p.y>H+50){projectiles.splice(i,1);continue}
      fighters.forEach(f=>{
        if(f!==p.owner&&f.invincible<=0&&Math.abs(p.x-f.x)<20&&Math.abs(p.y-(f.y-25))<30){
          if(p.explosive){sfxExplode();shake(6);spawnParticles(p.x,p.y,'#FF4444',12,5);
            fighters.forEach(ff=>{if(Math.abs(ff.x-p.x)<60&&Math.abs(ff.y-p.y)<50)ff.takeDamage(p.dmg,(ff.x-p.x)*0.3,-5,p.owner)});
          }else{f.takeDamage(p.dmg,p.vx*0.5,-3,p.owner)}
          projectiles.splice(i,1);
        }
      });
    }

    // planted bombs
    for(let i=plantedBombs.length-1;i>=0;i--){
      if(plantedBombs[i].update()){
        const b=plantedBombs[i];sfxExplode();shake(8);spawnParticles(b.x,b.y-8,'#FF4444',20,6);
        fighters.forEach(f=>{if(Math.abs(f.x-b.x)<b.radius&&Math.abs(f.y-b.y)<b.radius)f.takeDamage(b.dmg,(f.x-b.x)*0.3,-6,b.owner)});
        plantedBombs.splice(i,1);
      }
    }

    // stage hazards
    if(countdownTimer<=0)updateHazards();

    // items
    itemSpawnTimer--;
    if(itemSpawnTimer<=0&&activeItems.length<3){
      const def=ITEM_DEFS[Math.floor(Math.random()*ITEM_DEFS.length)];
      const plat=currentStage.platforms[Math.floor(Math.random()*currentStage.platforms.length)];
      activeItems.push(new GameItem(plat.x+Math.random()*plat.w,plat.y-60,def));itemSpawnTimer=420+Math.random()*300;
    }
    for(let i=activeItems.length-1;i>=0;i--){
      const item=activeItems[i];item.update(currentStage.platforms);if(item.life<=0){activeItems.splice(i,1);continue}
      fighters.forEach(f=>{
        if(Math.abs(item.x-f.x)<25&&Math.abs(item.y-f.y+15)<30){
          const eff=item.def;
          if(eff.effect==='heal'){f.hp=Math.min(f.maxHp,f.hp+eff.value);spawnParticles(f.x,f.y-20,'#5F5',8,2)}
          if(eff.effect==='speed'){f.speedMult=eff.value;f.effectTimers.speed=eff.duration}
          if(eff.effect==='strength'){f.strengthMult=eff.value;f.effectTimers.strength=eff.duration}
          if(eff.effect==='shield'){f.shielded=true;f.effectTimers.shield=eff.duration}
          if(eff.effect==='teleport'){const ox=fighters.find(o=>o!==f);if(ox){f.x=ox.x+(Math.random()>0.5?60:-60);spawnParticles(f.x,f.y-20,'#9B59B6',12,3)}}
          if(eff.effect==='explosive'){const ox=fighters.find(o=>o!==f);if(ox&&Math.abs(ox.x-item.x)<80)ox.takeDamage(eff.value,(ox.x-item.x)*0.2,-5,f);spawnParticles(item.x,item.y,'#FF4444',15,5);shake(6)}
          sfxItem();activeItems.splice(i,1);
        }
      });
    }

    // Smash Ball spawning
    smashBallTimer--;
    if(!smashBall&&smashBallTimer<=0&&!fighters[0].hasSmash&&!fighters[1].hasSmash){
      smashBall=new SmashBall();smashBallTimer=600+Math.random()*300; // respawn 10-15 sec later
    }
    // Smash Ball update & hit detection
    if(smashBall&&smashBall.active){
      smashBall.update();
      fighters.forEach(f=>{
        if(f.state==='attack'&&f.attackPhase==='active'){
          const dx=smashBall.x-f.x,dy=smashBall.y-(f.y-20);
          if(Math.sqrt(dx*dx+dy*dy)<50){smashBall.hit(f)}
        }
      });
    }

    // death check
    fighters.forEach(f=>{if(f.y>currentStage.deathY||f.x<-100||f.x>W+100)f.hp=0});
    // training: don't let fighters die
    if(gameMode==='training'){fighters.forEach(f=>{if(f.hp<20){f.hp=100;f.damage=0}})}

    let winner=null;
    if(fighters[0].hp<=0&&fighters[1].hp<=0)winner=fighters[0].damage<fighters[1].damage?fighters[0]:fighters[1];
    else if(fighters[0].hp<=0)winner=fighters[1];else if(fighters[1].hp<=0)winner=fighters[0];
    else if(roundTimer<=0)winner=fighters[0].hp>=fighters[1].hp?fighters[0]:fighters[1];
    if(winner){sfxKO();gameState=S.VICTORY;victoryTimer=240;winner.wins++;
      if(winner.playerNum===1){saveData.wins++;if(gameMode==='story')saveData.storyProgress=Math.max(saveData.storyProgress,storyLevel+1);save()}}
    updateParticles();if(shakeTime>0)shakeTime--;else shakeAmount=0;
  }
}

// ===== MAIN DRAW =====
function draw(){
  ctx.save();if(shakeAmount>0&&shakeTime>0)ctx.translate(Math.random()*shakeAmount-shakeAmount/2,Math.random()*shakeAmount-shakeAmount/2);
  if(gameState===S.MENU)drawMainMenu();
  else if(gameState===S.CHAR_SELECT)drawCharSelect();
  else if(gameState===S.STAGE_SELECT)drawStageSelect();
  else if(gameState===S.CAMP_SELECT)drawCampSelect();
  else if(gameState===S.MINIGAME)drawMinigame();
  else if(gameState===S.CREDITS)drawCredits();
  else if(gameState===S.STORY_INTRO)drawStoryIntro();
  else if(gameState===S.PAUSE){drawStage(currentStage);fighters.forEach(f=>f.draw());drawHUD();drawPause()}
  else if(gameState===S.FIGHTING||gameState===S.VICTORY){
    drawStage(currentStage);drawHazards();activeItems.forEach(it=>it.draw());
    if(smashBall&&smashBall.active)smashBall.draw();
    plantedBombs.forEach(b=>b.draw());projectiles.forEach(p=>p.draw());
    // Drop shadows under fighters
    if(currentStage&&currentStage.platforms)fighters.forEach(f=>drawShadow(f,currentStage.platforms));
    drawTrails();drawParticles();drawSparks();drawSpeedLines();
    fighters.forEach(f=>{drawElementalEffect(f);f.draw()});drawDmgNumbers();drawComboCounter();drawHUD();drawCountdown();
    drawFinalSmash();drawFlash();
    if(gameState===S.VICTORY)drawVictory();
  }
  ctx.restore();
}

// ===== MENU NAVIGATION =====
document.addEventListener('keydown',e=>{
  initAudio();const k=e.code;
  if(gameState===S.MENU){
    if(k==='ArrowUp'){menuSelection=(menuSelection-1+6)%6;sfxMenu()}
    if(k==='ArrowDown'){menuSelection=(menuSelection+1)%6;sfxMenu()}
    if(k==='Space'||k==='Enter'){sfxSelect();
      if(menuSelection===0){gameMode='vs_cpu';gameState=S.CHAR_SELECT}
      else if(menuSelection===1){gameMode='local';gameState=S.CHAR_SELECT}
      else if(menuSelection===2){gameMode='story';storyLevel=0;gameState=S.STORY_INTRO}
      else if(menuSelection===3){campSelect=0;gameState=S.CAMP_SELECT}
      else if(menuSelection===4){gameMode='training';gameState=S.CHAR_SELECT}
      else if(menuSelection===5)gameState=S.CREDITS}
  }else if(gameState===S.CHAR_SELECT){
    if(k==='ArrowLeft'){charSelectP1=(charSelectP1-1+charOrder.length)%charOrder.length;sfxMenu()}
    if(k==='ArrowRight'){charSelectP1=(charSelectP1+1)%charOrder.length;sfxMenu()}
    if(gameMode==='local'){if(k==='KeyA'){charSelectP2=(charSelectP2-1+charOrder.length)%charOrder.length;sfxMenu()}if(k==='KeyD'){charSelectP2=(charSelectP2+1)%charOrder.length;sfxMenu()}}
    if(k==='Space'||k==='Enter'){
      const p1Id=charOrder[charSelectP1];if(CHAR_DEFS[p1Id].locked&&!saveData.unlocked.includes(p1Id))return;
      if(gameMode==='local'){const p2Id=charOrder[charSelectP2];if(CHAR_DEFS[p2Id].locked&&!saveData.unlocked.includes(p2Id))return}
      sfxSelect();stageSelect=0;gameState=S.STAGE_SELECT}
    if(k==='Escape'){gameState=S.MENU;sfxMenu()}
  }else if(gameState===S.STAGE_SELECT){
    const allStages=gameMode==='training'?[TRAINING_STAGE,...STAGE_DEFS]:STAGE_DEFS;
    if(k==='ArrowLeft'){stageSelect=(stageSelect-1+allStages.length)%allStages.length;sfxMenu()}
    if(k==='ArrowRight'){stageSelect=(stageSelect+1)%allStages.length;sfxMenu()}
    if(k==='Space'||k==='Enter'){sfxSelect();
      const p1Id=charOrder[charSelectP1];let p2Id=charOrder[charSelectP2];
      if(gameMode!=='local'){const avail=charOrder.filter(c=>!CHAR_DEFS[c].locked||saveData.unlocked.includes(c));p2Id=avail[Math.floor(Math.random()*avail.length)]}
      startFight(p1Id,p2Id,stageSelect,gameMode!=='local',gameMode==='training'?0.2:0.5)}
    if(k==='Escape'){gameState=S.CHAR_SELECT;sfxMenu()}
  }else if(gameState===S.STORY_INTRO){
    if(k==='Space'||k==='Enter'){sfxSelect();startFight(saveData.unlocked[0]||'second_coming',storyOpponents[storyLevel],storyStages[storyLevel],true,Math.min(0.3+storyLevel*0.05,0.95));gameMode='story'}
    if(k==='Escape'){gameState=S.MENU;sfxMenu()}
  }else if(gameState===S.FIGHTING){
    if(k==='Escape'){gameState=S.PAUSE;menuSelection=0;sfxMenu()}
  }else if(gameState===S.PAUSE){
    if(k==='ArrowUp'){menuSelection=(menuSelection-1+2)%2;sfxMenu()}
    if(k==='ArrowDown'){menuSelection=(menuSelection+1)%2;sfxMenu()}
    if(k==='Space'||k==='Enter'){sfxSelect();if(menuSelection===0)gameState=S.FIGHTING;else{gameState=S.MENU;menuSelection=0}}
    if(k==='Escape')gameState=S.FIGHTING;
  }else if(gameState===S.VICTORY){
    if(k==='Space'||k==='Enter'){sfxSelect();
      if(gameMode==='story'){storyLevel++;if(storyLevel>=storyOpponents.length){gameState=S.MENU;menuSelection=0}else gameState=S.STORY_INTRO}
      else{gameState=S.MENU;menuSelection=0}}
  }else if(gameState===S.CAMP_SELECT){
    if(k==='ArrowLeft'){campSelect=(campSelect-1+charOrder.length)%charOrder.length;sfxMenu()}
    if(k==='ArrowRight'){campSelect=(campSelect+1)%charOrder.length;sfxMenu()}
    if(k==='Space'||k==='Enter'){
      const selId=charOrder[campSelect];
      const selDef=CHAR_DEFS[selId];
      if(selDef.locked&&!saveData.unlocked.includes(selId))return;
      if(!MINIGAME_DEFS[selId])return;
      sfxSelect();initMinigame(selId);
    }
    if(k==='Escape'){gameState=S.MENU;menuSelection=0;sfxMenu()}
  }else if(gameState===S.MINIGAME){
    if(k==='Escape'){gameState=S.CAMP_SELECT;sfxMenu();return}
    if(minigamePhase==='complete_success'||minigamePhase==='complete_fail'){
      if(k==='Space'||k==='Enter'){
        sfxSelect();
        if(minigamePhase==='complete_fail'){initMinigame(minigameChar)}
        else{gameState=S.CAMP_SELECT}
      }
    }else if(minigamePhase==='playing'){
      const def=MINIGAME_DEFS[minigameChar];
      if(def&&def.onInput)def.onInput(minigameState,k);
    }
  }else if(gameState===S.CREDITS){if(k==='Escape'){gameState=S.MENU;sfxMenu()}}
});

// ===== GAME LOOP =====
function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}
gameLoop();
</script>
