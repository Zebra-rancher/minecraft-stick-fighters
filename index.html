try{const s=localStorage.getItem('mcfighters2');if(s)saveData=JSON.parse(s)}catch(e){}
function save(){try{localStorage.setItem('mcfighters2',JSON.stringify(saveData))}catch(e){}}

// ===== INPUT =====
const keys={};const keysJustPressed={};
document.addEventListener('keydown',e=>{if(!keys[e.code])keysJustPressed[e.code]=true;keys[e.code]=true;e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.code]=false});
function clearJustPressed(){for(let k in keysJustPressed)delete keysJustPressed[k]}

// ===== SOUND =====
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(freq,dur,type='square',vol=0.15){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxHit(){playSound(200,0.1,'sawtooth',0.2)}
function sfxKO(){playSound(100,0.5,'sawtooth',0.3);setTimeout(()=>playSound(80,0.5,'sawtooth',0.2),200)}
function sfxJump(){playSound(400,0.1,'sine',0.1)}
function sfxItem(){playSound(800,0.15,'sine',0.15);setTimeout(()=>playSound(1000,0.15,'sine',0.15),100)}
function sfxSelect(){playSound(600,0.08,'square',0.1)}
function sfxMenu(){playSound(440,0.05,'square',0.08)}
function sfxGrab(){playSound(300,0.15,'triangle',0.12)}
function sfxLightning(){playSound(80,0.4,'sawtooth',0.25);playSound(120,0.3,'square',0.15)}
function sfxExplode(){playSound(60,0.3,'sawtooth',0.3);playSound(100,0.2,'square',0.2)}
function sfxGlide(){playSound(600,0.08,'sine',0.05)}

// ===== PARTICLES =====
let particles=[];
function spawnParticles(x,y,color,count=8,speed=3){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*speed*(0.5+Math.random()),vy:Math.sin(a)*speed*(0.5+Math.random()),life:30+Math.random()*20,maxLife:50,color,size:2+Math.random()*3});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });ctx.globalAlpha=1;
}

// ===== SCREEN SHAKE =====
let shakeAmount=0,shakeTime=0;
function shake(a){shakeAmount=a;shakeTime=10}

// ===== ENCHANT SHIMMER =====
function drawEnchantShimmer(x,y,w,h){
  const t=Date.now()/200;
  for(let i=0;i<3;i++){
    const ox=Math.sin(t+i*2)*2,oy=Math.cos(t+i*1.5)*2;
    ctx.fillStyle=`rgba(120,80,255,${0.15+Math.sin(t+i)*0.1})`;
    ctx.fillRect(x+ox-1,y+oy-1,w+2,h+2);
  }
  // sparkle
  const sx=x+Math.sin(t*1.3)*w*0.4+w/2, sy=y+Math.cos(t*1.7)*h*0.4+h/2;
  ctx.fillStyle=`rgba(200,180,255,${0.5+Math.sin(t*3)*0.5})`;
  ctx.fillRect(sx-1,sy-1,3,3);
}

// ===== WEAPON DRAWING =====
function drawWeapon(type,x,y,angle,facing,enchanted=true){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);ctx.scale(facing,1);

  if(type==='diamond_sword'){
    // blade
    ctx.fillStyle='#5DE8E0';ctx.fillRect(0,-2,22,4);
    ctx.fillStyle='#4BC8C0';ctx.fillRect(18,-3,6,6); // tip
    // guard
    ctx.fillStyle='#8B6914';ctx.fillRect(-4,-5,6,10);
    // handle
    ctx.fillStyle='#654321';ctx.fillRect(-10,-2,8,4);
    if(enchanted)drawEnchantShimmer(-2,-4,24,8);
  }
  else if(type==='diamond_axe'){
    // handle
    ctx.fillStyle='#654321';ctx.fillRect(-8,-2,24,4);
    // axe head
    ctx.fillStyle='#5DE8E0';
    ctx.beginPath();ctx.moveTo(14,-2);ctx.lineTo(22,-10);ctx.lineTo(24,-8);ctx.lineTo(24,8);ctx.lineTo(22,10);ctx.lineTo(14,2);ctx.fill();
    ctx.fillStyle='#4BC8C0';ctx.fillRect(14,-2,4,4);
    if(enchanted)drawEnchantShimmer(12,-10,14,20);
  }
  else if(type==='bow'){
    // bow curve
    ctx.strokeStyle='#8B6914';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(8,0,14,Math.PI*-0.4,Math.PI*0.4);ctx.stroke();
    // string
    ctx.strokeStyle='#CCC';ctx.lineWidth=1;
    const bx1=8+Math.cos(-Math.PI*0.4)*14, by1=Math.sin(-Math.PI*0.4)*14;
    const bx2=8+Math.cos(Math.PI*0.4)*14, by2=Math.sin(Math.PI*0.4)*14;
    ctx.beginPath();ctx.moveTo(bx1,by1);ctx.lineTo(4,0);ctx.lineTo(bx2,by2);ctx.stroke();
    // arrow nocked
    ctx.fillStyle='#AAA';ctx.fillRect(0,-1,18,2);
    ctx.fillStyle='#888';ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(22,-3);ctx.lineTo(22,3);ctx.fill();
  }
  else if(type==='trident'){
    // shaft
    ctx.fillStyle='#3A6B7E';ctx.fillRect(-6,-2,28,3);
    // three prongs
    ctx.fillStyle='#5DE8E0';
    ctx.fillRect(18,-8,3,18); // center
    ctx.fillRect(14,-6,3,6);  // left
    ctx.fillRect(14,2,3,6);   // right
    // prong tips
    ctx.fillStyle='#4BC8C0';
    ctx.fillRect(18,-10,3,4);ctx.fillRect(14,-8,3,4);ctx.fillRect(14,6,3,4);
    if(enchanted)drawEnchantShimmer(12,-10,12,22);
  }
  else if(type==='fishing_rod'){
    // rod
    ctx.fillStyle='#8B6914';ctx.fillRect(-4,-1,22,3);
    ctx.fillStyle='#654321';ctx.fillRect(14,-2,4,5);
    // line
    ctx.strokeStyle='#CCC';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(26,8);ctx.stroke();
    // hook
    ctx.strokeStyle='#AAA';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(26,10,3,0,Math.PI);ctx.stroke();
  }
  else if(type==='fists'){
    // just draw a fist
    ctx.fillStyle='#DAA520';ctx.fillRect(2,-5,10,10);
    ctx.fillStyle='#C8941E';ctx.fillRect(4,-3,3,6);ctx.fillRect(8,-3,3,6);
  }
  else if(type==='tnt'){
    // TNT block
    ctx.fillStyle='#FF4444';ctx.fillRect(2,-7,14,14);
    ctx.fillStyle='#CC3333';ctx.fillRect(4,-5,10,3);ctx.fillRect(4,2,10,3);
    ctx.fillStyle='#FFF';ctx.fillRect(6,-3,6,6);
    ctx.fillStyle='#222';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.fillText('T',9,2);
    // fuse
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(9,-7);ctx.lineTo(9,-12);ctx.stroke();
    ctx.fillStyle='#FF8800';ctx.fillRect(7,-14,4,4);
  }
  else if(type==='command_block'){
    // golden staff with command block on top
    ctx.fillStyle='#DAA520';ctx.fillRect(-6,-2,20,4);
    // command block head
    ctx.fillStyle='#FF8800';ctx.fillRect(12,-8,12,12);
    ctx.fillStyle='#FFB347';ctx.fillRect(14,-6,8,8);
    // command symbol
    ctx.fillStyle='#FF4444';ctx.fillRect(16,-4,4,4);
    // golden particles
    const t=Date.now()/150;
    for(let i=0;i<3;i++){
      ctx.fillStyle=`rgba(255,200,50,${0.3+Math.sin(t+i)*0.3})`;
      ctx.fillRect(14+Math.sin(t+i*2)*6,Math.cos(t+i*2)*6-2,3,3);
    }
  }
  else if(type==='crossbow'){
    // stock
    ctx.fillStyle='#654321';ctx.fillRect(-6,-2,18,4);
    // bow arms
    ctx.fillStyle='#8B6914';
    ctx.fillRect(10,-10,4,8);ctx.fillRect(10,2,4,8);
    // string
    ctx.strokeStyle='#CCC';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(12,-10);ctx.lineTo(6,0);ctx.lineTo(12,10);ctx.stroke();
    // bolt
    ctx.fillStyle='#AAA';ctx.fillRect(2,-1,14,2);
    ctx.fillStyle='#F44';ctx.beginPath();ctx.moveTo(16,0);ctx.lineTo(20,-2);ctx.lineTo(20,2);ctx.fill();
  }
  else if(type==='elytra'){
    // wing shape
    ctx.fillStyle='#8844AA';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-16,-12);ctx.lineTo(-20,-6);ctx.lineTo(-6,4);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-16,12);ctx.lineTo(-20,6);ctx.lineTo(-6,-4);ctx.fill();
    ctx.fillStyle='#AA66CC';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-12,-8);ctx.lineTo(-14,-4);ctx.lineTo(-4,2);ctx.fill();
  }

  ctx.restore();
}

}

// ===== FIGHTER CLASS =====
class Fighter{
  constructor(charId,x,facing,playerNum){
    const def=CHAR_DEFS[charId];
    this.id=charId;this.def=def;this.x=x;this.y=H-200;this.vx=0;this.vy=0;
    this.facing=facing;this.playerNum=playerNum;
    this.hp=100;this.maxHp=100;this.damage=0;
    this.grounded=false;this.jumps=2;this.jumpCount=0;
    this.state='idle';
    this.attackTimer=0;this.attackPhase='';this.currentAttack=null;
    this.hitstunTimer=0;this.invincible=0;
    this.animFrame=0;this.animTimer=0;this.walkCycle=0;
    this.combo=0;this.comboTimer=0;this.lastHitBy=null;
    this.speedMult=1;this.strengthMult=1;this.shielded=false;
    this.effectTimers={speed:0,strength:0,shield:0,rage:0,poison:0,slow:0,weak:0,fireworkBoost:0};
    this.rageActive=false;
    this.gliding=false;
    this.potionIndex=0;
    this.wins=0;
    this.ai=null;
    this._jumpHeld=false;this._attackHeld=false;
    this.grabTarget=null;this.grabTimer=0;
    this.fishingLine=null; // {x,y,vx,vy,active}
    this.totemActive=false;this.totemTimer=0;
  }

  getAttack(dir,inAir){
    const a=this.def.attacks;
    if(inAir){
      if(dir==='up')return a.airUp;if(dir==='down')return a.airDown;
      if(dir==='forward')return a.airForward;return a.airNeutral;
    }
    if(dir==='up')return a.up;if(dir==='down')return a.down;
    if(dir==='forward')return a.forward;if(dir==='special')return a.special;
    return a.neutral;
  }

  startAttack(dir){
    if(this.state==='attack'||this.state==='hitstun')return;
    const atk=this.getAttack(dir,!this.grounded);
    this.currentAttack={...atk,_hit:false,_projSpawned:false};
    this.attackTimer=atk.startup+atk.active+atk.recover;
    this.attackPhase='startup';this.state='attack';
    playSound(300,0.05,'square',0.08);
  }

  update(platforms,opponent,stage){
    // effect timers
    for(let k in this.effectTimers){
      if(this.effectTimers[k]>0){this.effectTimers[k]--;
        if(this.effectTimers[k]<=0){
          if(k==='speed'||k==='slow')this.speedMult=1;
          if(k==='strength'||k==='weak')this.strengthMult=1;
          if(k==='shield')this.shielded=false;
          if(k==='rage')this.rageActive=false;
        }
      }
    }
    // poison tick
    if(this.effectTimers.poison>0&&this.animTimer%30===0){this.hp-=2;spawnParticles(this.x,this.y-20,'#00AA00',3,1)}
    // command aura
    if(this.def.passive==='commandAura'&&opponent&&this.state!=='hitstun'){
      const d=Math.sqrt((opponent.x-this.x)**2+(opponent.y-this.y)**2);
      if(d<100&&this.animTimer%60===0){opponent.hp-=1;spawnParticles(opponent.x,opponent.y-20,'#FFD700',2,1)}
    }
    // rage passive
    if(this.def.passive==='rage'&&this.hp<30&&!this.rageActive){this.strengthMult=Math.max(this.strengthMult,1.3)}

    if(this.invincible>0)this.invincible--;
    if(this.totemActive){this.totemTimer--;this.invincible=2;if(this.totemTimer<=0)this.totemActive=false}
    this.animTimer++;if(this.animTimer%6===0)this.animFrame++;

    // hitstun
    if(this.state==='hitstun'){this.hitstunTimer--;if(this.hitstunTimer<=0)this.state='idle'}

    // attack timer
    if(this.state==='attack'){
      this.attackTimer--;const atk=this.currentAttack;
      const elapsed=(atk.startup+atk.active+atk.recover)-this.attackTimer;
      if(elapsed<atk.startup)this.attackPhase='startup';
      else if(elapsed<atk.startup+atk.active)this.attackPhase='active';
      else this.attackPhase='recover';
      if(this.attackTimer<=0){this.state='idle';this.currentAttack=null;this.attackPhase=''}
    }

    // combo timer
    if(this.comboTimer>0)this.comboTimer--;else this.combo=0;

    // gliding (Purple passive)
    if(this.def.passive==='elytra'&&this.gliding&&!this.grounded){
      this.vy=Math.min(this.vy,0.5); // slow fall
      this.vx*=0.99;
      if(this.animTimer%10===0)sfxGlide();
    }

    // gravity
    if(!this.grounded){this.vy+=0.6;if(this.vy>15)this.vy=15}

    // move
    this.x+=this.vx;this.y+=this.vy;

    // friction
    if(this.grounded&&this.state!=='hitstun')this.vx*=0.8;
    else if(this.state==='hitstun')this.vx*=0.98;
    else this.vx*=0.92;

    // platform collision
    this.grounded=false;
    for(const p of platforms){
      if(this.vy>=0&&this.y>=p.y&&this.y-this.vy<p.y+5&&this.x>p.x&&this.x<p.x+p.w){
        this.y=p.y;this.vy=0;this.grounded=true;this.jumpCount=0;this.gliding=false;
      }
    }

    // walls (training stage)
    if(stage&&stage.walls){
      if(this.x<80){this.x=80;this.vx=Math.abs(this.vx)*0.5}
      if(this.x>W-80){this.x=W-80;this.vx=-Math.abs(this.vx)*0.5}
      if(this.y>H-60){this.y=H-60;this.vy=0;this.grounded=true;this.jumpCount=0}
    }

    // walk cycle
    if(this.grounded&&Math.abs(this.vx)>0.5)this.walkCycle+=0.15;else this.walkCycle=0;

    // auto face opponent
    if(opponent&&this.state!=='attack'&&this.state!=='hitstun'){
      this.facing=opponent.x>this.x?1:-1;
    }

    // fishing line update
    if(this.fishingLine){
      const fl=this.fishingLine;
      fl.x+=fl.vx;fl.y+=fl.vy;fl.vy+=0.2;fl.life--;
      if(fl.life<=0)this.fishingLine=null;
      else if(opponent&&Math.abs(fl.x-opponent.x)<25&&Math.abs(fl.y-(opponent.y-20))<30){
        // hook hit! pull opponent
        const dx=this.x-opponent.x;const dy=(this.y-20)-opponent.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        opponent.vx=dx/d*8;opponent.vy=dy/d*5;
        opponent.hitstunTimer=15;opponent.state='hitstun';
        sfxGrab();spawnParticles(opponent.x,opponent.y-20,'#CCC',5,2);
        this.fishingLine=null;
      }
    }
  }

  takeDamage(dmg,kbx,kby,attacker){
    if(this.invincible>0)return;
    if(this.totemActive){spawnParticles(this.x,this.y-20,'#FFD700',10,3);return}
    const actualDmg=this.shielded?dmg*0.5:dmg;
    this.hp-=actualDmg;this.damage+=actualDmg*0.3;
    const kbMult=1+this.damage/80;
    this.vx=kbx*kbMult;this.vy=kby*kbMult;
    this.hitstunTimer=Math.floor(10+actualDmg*1.5);this.state='hitstun';this.invincible=8;
    this.lastHitBy=attacker;this.gliding=false;
    sfxHit();shake(Math.min(actualDmg/3,8));spawnParticles(this.x,this.y-20,this.def.color,6,actualDmg/3);
  }

  draw(){
    const f=this;const c=f.def.color;
    const blink=f.invincible>0&&Math.floor(f.invincible/2)%2===0;if(blink)return;
    ctx.save();ctx.translate(f.x,f.y);
    const headY=-50,bodyTop=-42,bodyBot=-10,legLen=18,armLen=16;

    // elytra wings on back
    if(f.def.passive==='elytra'){
      const wingSpread=f.gliding?1.2:0.6;
      ctx.fillStyle=f.gliding?'#AA66CC':'#7744AA';
      ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(-20*wingSpread,-45);ctx.lineTo(-15*wingSpread,-25);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(20*wingSpread,-45);ctx.lineTo(15*wingSpread,-25);ctx.closePath();ctx.fill();
    }

    // legs
    const lAngle=Math.sin(f.walkCycle)*0.5;
    ctx.strokeStyle=c;ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,bodyBot);ctx.lineTo(-6+Math.sin(lAngle)*legLen,-10+legLen*0.8);ctx.lineTo(-8+Math.sin(lAngle)*legLen*1.2,bodyBot+legLen);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,bodyBot);ctx.lineTo(6+Math.sin(-lAngle)*legLen,-10+legLen*0.8);ctx.lineTo(8+Math.sin(-lAngle)*legLen*1.2,bodyBot+legLen);ctx.stroke();

    // body
    ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,bodyTop);ctx.lineTo(0,bodyBot);ctx.stroke();

    // arms + weapon
    const atkAnim=f.state==='attack'?f.attackPhase:'';
    const armBaseY=-38;

    if(atkAnim==='active'||atkAnim==='startup'){
      const atk=f.currentAttack;
      const progress=atkAnim==='startup'?0.5:1;
      let weapAngle=f.facing*Math.PI*0.3*progress,weapX=f.facing*18*progress,weapY=armBaseY;

      if(atk.name&&(atk.name.includes('Uppercut')||atk.name.includes('Upper')||atk.name.includes('Launch')||atk.name.includes('Sky')||atk.name.includes('Riptide')||atk.name.includes('Rising'))){
        weapAngle=-Math.PI*0.6*progress;weapX=f.facing*10;weapY=armBaseY-10;
      }else if(atk.name&&(atk.name.includes('Slam')||atk.name.includes('Drop')||atk.name.includes('Ground')||atk.name.includes('Down')||atk.name.includes('Meteor'))){
        weapAngle=Math.PI*0.4*progress;weapX=f.facing*8;weapY=armBaseY+5;
      }

      // attack arm
      ctx.strokeStyle=c;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(weapX,weapY);ctx.stroke();
      // draw weapon
      const wType=atk.weaponDraw||f.def.weaponType;
      if(wType)drawWeapon(wType,weapX,weapY,weapAngle,f.facing);
      // other arm
      ctx.strokeStyle=c;ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.facing*12,armBaseY+8);ctx.stroke();
    }else if(f.state==='hitstun'){
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.vx*2,armBaseY-8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.vx*2+5,armBaseY+5);ctx.stroke();
    }else{
      const aSwing=Math.sin(f.walkCycle)*0.3;
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(f.facing*12+Math.sin(aSwing)*5,armBaseY+10);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.facing*5-Math.sin(aSwing)*5,armBaseY+12);ctx.stroke();
      drawWeapon(f.def.weaponType,f.facing*14,armBaseY+12,0.3,f.facing);
    }

    // head
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(0,headY,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(f.facing*3-2,headY-3,3,3);ctx.fillRect(f.facing*6-1,headY-3,3,3);

    // King Orange crown
    if(f.id==='king_orange'){
      ctx.fillStyle='#FFD700';
      ctx.fillRect(-8,headY-18,16,8);
      ctx.fillRect(-10,headY-20,4,10);ctx.fillRect(-2,headY-22,4,12);ctx.fillRect(6,headY-20,4,10);
      // command aura
      const t=Date.now()/300;
      for(let i=0;i<6;i++){
        ctx.fillStyle=`rgba(255,200,50,${0.2+Math.sin(t+i)*0.15})`;
        ctx.fillRect(Math.cos(t+i)*30-2,Math.sin(t+i)*25-30,4,4);
      }
    }

    // effects
    if(f.rageActive||f.effectTimers.rage>0){
      ctx.strokeStyle='rgba(255,50,50,0.4)';ctx.lineWidth=1;
      for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(Math.random()*20-10,Math.random()*-50);ctx.lineTo(Math.random()*20-10,-55-Math.random()*10);ctx.stroke()}
    }
    if(f.shielded){ctx.strokeStyle='rgba(100,200,255,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-25,28,0,Math.PI*2);ctx.stroke()}
    if(f.speedMult>1){ctx.strokeStyle='rgba(0,191,255,0.3)';ctx.lineWidth=1;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(-f.facing*(10+i*8),-40+i*10);ctx.lineTo(-f.facing*(15+i*8),-35+i*10);ctx.stroke()}}
    if(f.totemActive){ctx.fillStyle=`rgba(255,215,0,${0.3+Math.sin(Date.now()/150)*0.2})`;ctx.beginPath();ctx.arc(0,-25,25,0,Math.PI*2);ctx.fill()}
    if(f.effectTimers.fireworkBoost>0){
      for(let i=0;i<3;i++){spawnParticles(f.x+Math.random()*10-5,f.y-10+Math.random()*10,['#F00','#0F0','#FF0','#F0F'][i%4],1,2)}
    }

    // fishing line visual
    if(f.fishingLine){
      ctx.strokeStyle='#CCC';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(f.facing*14-f.x+f.x,armBaseY);
      ctx.lineTo(f.fishingLine.x-f.x,f.fishingLine.y-f.y);ctx.stroke();ctx.setLineDash([]);
    }

    ctx.restore();
  }
}

let activeItems=[];
class GameItem{
  constructor(x,y,def){this.x=x;this.y=y;this.def=def;this.vy=0;this.grounded=false;this.life=600;this.bobTimer=0}
  update(platforms){
    if(!this.grounded){this.vy+=0.4;this.y+=this.vy;
      for(const p of platforms){if(this.vy>=0&&this.y>=p.y-8&&this.y-this.vy<p.y&&this.x>p.x&&this.x<p.x+p.w){this.y=p.y-8;this.vy=0;this.grounded=true}}
    }
    this.bobTimer+=0.05;this.life--;
  }
  draw(){
    const bob=Math.sin(this.bobTimer)*3,y=this.y+bob;
    ctx.fillStyle=this.def.color;
    if(this.def.icon==='apple'){ctx.beginPath();ctx.arc(this.x,y,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4A2';ctx.fillRect(this.x-1,y-12,2,5)}
    else if(this.def.icon==='steak'){ctx.beginPath();ctx.ellipse(this.x,y,10,7,0,0,Math.PI*2);ctx.fill()}
    else if(this.def.icon==='potion'){ctx.fillRect(this.x-4,y-10,8,14);ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(this.x-3,y-8,3,5);ctx.fillStyle='#654';ctx.fillRect(this.x-3,y-13,6,4)}
    else if(this.def.icon==='pearl'){ctx.beginPath();ctx.arc(this.x,y,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(this.x-2,y-2,3,0,Math.PI*2);ctx.fill()}
    else if(this.def.icon==='tnt'){ctx.fillRect(this.x-8,y-8,16,16);ctx.fillStyle='#FFF';ctx.fillRect(this.x-2,y-12,4,5);ctx.fillStyle='#000';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('T',this.x,y+3)}
    else if(this.def.icon==='shield'){ctx.beginPath();ctx.moveTo(this.x,y-10);ctx.lineTo(this.x+8,y-5);ctx.lineTo(this.x+6,y+8);ctx.lineTo(this.x,y+12);ctx.lineTo(this.x-6,y+8);ctx.lineTo(this.x-8,y-5);ctx.closePath();ctx.fill()}
    if(this.life<120&&Math.floor(this.life/8)%2===0){ctx.globalAlpha=0.3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x,y,12,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
  }
}

// ===== AI CONTROLLER =====
class AIController{
  constructor(difficulty=0.5){this.difficulty=difficulty;this.actionTimer=0}
  update(fighter,opponent,platforms){
    this.actionTimer--;if(this.actionTimer>0)return;
    const dx=opponent.x-fighter.x,dy=opponent.y-fighter.y,dist=Math.abs(dx),dir=dx>0?1:-1;
    const r=Math.random(),agg=this.difficulty;
    if(fighter.state==='hitstun'){this.actionTimer=5;return}
    if(dist<60&&r<agg*0.8){
      const ar=Math.random();
      if(dy<-30&&ar<0.3)fighter.startAttack('up');
      else if(dy>30&&ar<0.2)fighter.startAttack('down');
      else if(ar<0.5)fighter.startAttack('forward');
      else if(ar<0.7)fighter.startAttack('neutral');
      else fighter.startAttack('special');
      this.actionTimer=Math.floor(15-agg*8);
    }else if(dist<150&&r<agg*0.5){
      if(Math.random()<0.6)fighter.vx=dir*fighter.def.speed*fighter.speedMult;
      else fighter.startAttack('forward');
      this.actionTimer=Math.floor(12-agg*5);
    }else{
      if(r<0.7||dist>200)fighter.vx=dir*fighter.def.speed*fighter.speedMult*(0.5+agg*0.5);
      if((dy<-50||Math.random()<0.15)&&fighter.grounded){fighter.vy=-fighter.def.jumpForce;fighter.grounded=false;fighter.jumpCount++}
      this.actionTimer=Math.floor(10-agg*4);
    }
    if(fighter.y>H-80&&!fighter.grounded&&fighter.jumpCount<fighter.jumps){fighter.vy=-fighter.def.jumpForce;fighter.jumpCount++;fighter.vx=fighter.x<W/2?3:-3}
    if(opponent.state==='attack'&&dist<80&&Math.random()<agg*0.4){
      if(fighter.grounded){fighter.vy=-fighter.def.jumpForce*0.7;fighter.grounded=false;fighter.jumpCount++}
      fighter.vx=-dir*fighter.def.speed;this.actionTimer=8;
    }
    for(const item of activeItems){if(Math.abs(item.x-fighter.x)<60&&Math.abs(item.y-fighter.y)<40)fighter.vx=(item.x-fighter.x)*0.1}
  }
}

// ===== DRAW HELPERS =====
function drawText(text,x,y,size=16,color='#fff',align='center'){
  ctx.font=`bold ${size}px 'Courier New',monospace`;ctx.textAlign=align;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(text,x+2,y+2);ctx.fillStyle=color;ctx.fillText(text,x,y);
}
function drawBox(x,y,w,h,fill='#333',border='#555'){
  ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);ctx.strokeStyle=border;ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
}
function drawHealthBar(x,y,w,hp,maxHp,color,name,damage){
  drawBox(x-2,y-2,w+4,24,'#222','#444');
  const pct=Math.max(0,hp/maxHp);ctx.fillStyle='#500';ctx.fillRect(x,y,w,20);
  ctx.fillStyle=color;ctx.fillRect(x,y,w*pct,20);
  if(damage>0){ctx.fillStyle='rgba(255,100,0,0.5)';ctx.fillRect(x+w*pct,y,Math.min(damage/200*w,w-w*pct),20)}
  drawText(`${name}: ${Math.ceil(hp)}%`,x+w/2,y+15,12,'#fff');
}
function drawMinecraftBlock(x,y,w,h,color){
  ctx.fillStyle=color;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  for(let bx=x;bx<x+w;bx+=16){ctx.beginPath();ctx.moveTo(bx,y);ctx.lineTo(bx,y+h);ctx.stroke()}
  for(let by=y;by<y+h;by+=16){ctx.beginPath();ctx.moveTo(x,by);ctx.lineTo(x+w,by);ctx.stroke()}
}

// ===== COMBAT RESOLUTION =====
function checkAttackHit(attacker,defender){
  if(attacker.state!=='attack'||attacker.attackPhase!=='active')return;
  if(defender.invincible>0)return;
  const atk=attacker.currentAttack;if(!atk||atk._hit)return;
  const dx=defender.x-attacker.x,dy=defender.y-attacker.y,dist=Math.sqrt(dx*dx+dy*dy);
  const inFront=dx*attacker.facing>-20;

  // projectile spawning
  if(atk.projectile&&!atk._projSpawned){
    const spd=atk.projSpeed||8;
    let pvx=attacker.facing*spd,pvy=atk.projAngle?atk.projAngle*spd:-0.5;
    const pc=atk.projColor||attacker.def.color;
    if(atk.multiShot){
      for(let i=0;i<atk.multiShot;i++){projectiles.push(new Projectile(attacker.x+attacker.facing*20,attacker.y-30+i*12,pvx,pvy+i*0.5-0.5,atk.dmg*0.6*attacker.strengthMult,atk.kb*0.5,attacker,pc,atk.explosive))}
    }else{
      projectiles.push(new Projectile(attacker.x+attacker.facing*20,attacker.y-30,pvx,pvy,atk.dmg*attacker.strengthMult,atk.kb,attacker,pc,atk.explosive));
    }
    atk._projSpawned=true;atk._hit=true;return;
  }

  // fishing rod grab
  if(atk.grab&&!atk._projSpawned){
    attacker.fishingLine={x:attacker.x+attacker.facing*20,y:attacker.y-30,vx:attacker.facing*10,vy:-3,life:30};
    sfxGrab();atk._projSpawned=true;atk._hit=true;return;
  }

  // grapple (aerial fishing rod)
  if(atk.grapple&&!atk._projSpawned){
    attacker.fishingLine={x:attacker.x,y:attacker.y,vx:attacker.facing*6,vy:8,life:25};
    sfxGrab();atk._projSpawned=true;atk._hit=true;return;
  }

  // riptide
  if(atk.riptide&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.3;attacker.vx=attacker.facing*4;
    spawnParticles(attacker.x,attacker.y,'#5DE8E0',10,3);atk._projSpawned=true;
  }

  // elytra launch
  if(atk.elytraLaunch&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.5;attacker.gliding=true;
    spawnParticles(attacker.x,attacker.y,'#9B59B6',8,3);atk._projSpawned=true;sfxJump();
  }

  // elytra dive punch
  if(atk.elytraDive&&!atk._projSpawned){
    attacker.vx=attacker.facing*12;attacker.vy=-2;
    spawnParticles(attacker.x,attacker.y,'#AA66CC',6,4);atk._projSpawned=true;
  }

  // firework boost
  if(atk.fireworkBoost&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.8;attacker.gliding=true;
    attacker.effectTimers.fireworkBoost=180;
    spawnParticles(attacker.x,attacker.y+10,'#FF0',15,5);
    sfxExplode();atk._projSpawned=true;atk._hit=true;return;
  }

  // teleport up (Second Coming)
  if(atk.teleportUp&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.5;
    spawnParticles(attacker.x,attacker.y,'#9B59B6',12,3);atk._projSpawned=true;
  }

  // command teleport
  if(atk.commandTP&&!atk._projSpawned&&defender){
    attacker.x=defender.x-attacker.facing*40;
    spawnParticles(attacker.x,attacker.y-20,'#FFD700',15,5);atk._projSpawned=true;
  }

  // totem of undying
  if(atk.totem&&!atk._projSpawned){
    attacker.totemActive=true;attacker.totemTimer=120;
    spawnParticles(attacker.x,attacker.y-20,'#FFD700',20,4);
    playSound(800,0.2,'sine',0.15);atk._projSpawned=true;atk._hit=true;return;
  }

  // rage mode
  if(atk.rage&&!atk._projSpawned){
    attacker.hp-=atk.selfDmg;attacker.rageActive=true;attacker.strengthMult=2;
    attacker.effectTimers.rage=300;
    spawnParticles(attacker.x,attacker.y-20,'#FF4444',15,5);
    playSound(150,0.3,'sawtooth',0.2);atk._projSpawned=true;atk._hit=true;return;
  }

  // potion attacks (Blue)
  if(atk.potion&&!atk._projSpawned){
    const potions=['slowness','weakness','harming','poison'];
    const potType=potions[attacker.potionIndex%potions.length];
    attacker.potionIndex++;
    const potColors={slowness:'#4488FF',weakness:'#888888',harming:'#AA44FF',poison:'#44AA44'};
    spawnParticles(attacker.x+attacker.facing*30,attacker.y-20,potColors[potType],12,3);
    // apply to nearby opponent
    if(defender&&dist<atk.range){
      if(potType==='slowness'){defender.speedMult=0.5;defender.effectTimers.slow=180}
      if(potType==='weakness'){defender.strengthMult=0.6;defender.effectTimers.weak=180}
      if(potType==='harming'){defender.takeDamage(12,attacker.facing*3,-2,attacker)}
      if(potType==='poison'){defender.effectTimers.poison=240}
    }
    atk._projSpawned=true;atk._hit=true;return;
  }
  if(atk.poison&&!atk._projSpawned){
    if(defender&&dist<atk.range){defender.effectTimers.poison=300;spawnParticles(defender.x,defender.y-20,'#44AA44',10,3)}
    atk._projSpawned=true;atk._hit=true;return;
  }

  // levitate (King Orange)
  if(atk.levitate&&dist<atk.range&&inFront&&!atk._hit){
    defender.vy=-10;defender.hitstunTimer=20;defender.state='hitstun';
    spawnParticles(defender.x,defender.y-20,'#FFD700',8,3);atk._hit=true;return;
  }

  // lightning (Green special / King Orange)
  if(atk.lightning&&!atk._projSpawned){
    if(defender){
      const lx=defender.x;
      ctx.strokeStyle='#FFE44D';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx+Math.random()*20-10,H*0.3);ctx.lineTo(lx+Math.random()*20-10,H*0.6);ctx.lineTo(lx,defender.y);ctx.stroke();
      defender.takeDamage(atk.dmg*attacker.strengthMult,0,-8,attacker);
      sfxLightning();spawnParticles(lx,defender.y-20,'#FFE44D',15,5);shake(10);
    }
    atk._projSpawned=true;atk._hit=true;return;
  }

  // plant bomb (Yellow)
  if(atk.plantBomb&&!atk._projSpawned){
    plantedBombs.push(new PlantedBomb(attacker.x,attacker.y,attacker,180,70,18));
    atk._projSpawned=true;atk._hit=true;return;
  }

  // end crystal (Yellow)
  if(atk.endCrystal&&!atk._projSpawned){
    plantedBombs.push(new PlantedBomb(attacker.x,attacker.y+20,attacker,120,90,22));
    spawnParticles(attacker.x,attacker.y,'#FF69FF',8,3);atk._projSpawned=true;atk._hit=true;return;
  }

  // chain TNT (Yellow special)
  if(atk.chainTNT&&!atk._projSpawned){
    for(let i=0;i<3;i++){plantedBombs.push(new PlantedBomb(attacker.x+attacker.facing*(i*40),attacker.y,attacker,60+i*40,60,15))}
    atk._projSpawned=true;atk._hit=true;return;
  }

  // self launch
  if(atk.selfLaunch&&!atk._projSpawned){
    attacker.vy=-attacker.def.jumpForce*1.3;if(atk.selfDmg)attacker.hp-=atk.selfDmg;
    sfxExplode();spawnParticles(attacker.x,attacker.y,'#FF4444',10,4);atk._projSpawned=true;
  }

  // explosive melee
  if(atk.explosive&&!atk.projectile&&!atk._projSpawned){
    spawnParticles(attacker.x+attacker.facing*30,attacker.y-20,'#FF4444',15,5);
    sfxExplode();shake(6);atk._projSpawned=true;
  }

  // charge attack
  if(atk.charge&&!atk._projSpawned){attacker.vx=attacker.facing*8;atk._projSpawned=true}

  // shockwave
  if(atk.shockwave&&!atk._projSpawned){
    spawnParticles(attacker.x,attacker.y,'#AAA',12,4);shake(5);atk._projSpawned=true;
  }

  // normal melee hit
  if(dist<atk.range&&(inFront||dist<30)){
    const dmg=atk.dmg*attacker.strengthMult;
    if(attacker.effectTimers.fireworkBoost>0)dmg*2; // Purple firework boost doubles next aerial
    let kbx=attacker.facing*atk.kb*0.8,kby=-atk.kb*0.5;
    if(atk.name&&(atk.name.includes('Upper')||atk.name.includes('Launch')||atk.name.includes('Sky')||atk.name.includes('Rising'))){kby=-atk.kb;kbx=attacker.facing*2}
    if(atk.name&&(atk.name.includes('Slam')||atk.name.includes('Drop')||atk.name.includes('Meteor')||atk.name.includes('Down')||atk.name.includes('Ground'))){kby=atk.kb*0.3;kbx=attacker.facing*atk.kb*0.5}

    const finalDmg=attacker.effectTimers.fireworkBoost>0&&!attacker.grounded?dmg*2:dmg;
    defender.takeDamage(finalDmg,kbx,kby,attacker);
    if(attacker.effectTimers.fireworkBoost>0&&!attacker.grounded)attacker.effectTimers.fireworkBoost=0;
    atk._hit=true;

    // combo tracking
    if(atk.combo&&attacker.comboTimer>0)attacker.combo++;else attacker.combo=1;
    attacker.comboTimer=30;
    if(atk.selfDmg){attacker.hp-=atk.selfDmg;spawnParticles(attacker.x,attacker.y-20,'#FF4444',6,3)}
  }
}

// ===== DRAW HUD =====
function drawHUD(){
  if(!fighters[0]||!fighters[1])return;

  drawHealthBar(W-300,15,280,fighters[1].hp,fighters[1].maxHp,fighters[1].def.color,fighters[1].def.name,fighters[1].damage);

  drawText(secs.toString(),W/2,35,24,secs<=10?'#F44':'#fff');
  const ml=gameMode==='story'?`Story ${storyLevel+1}/7`:gameMode==='training'?'Training':gameMode==='local'?'1v1 Local':'VS CPU';
  drawText(ml,W/2,55,11,'#666');
  // potion indicator for Blue
  fighters.forEach(f=>{

}

      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-15,y+15);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+15,y+15);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+20);ctx.lineTo(x-10,y+40);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+20);ctx.lineTo(x+10,y+40);ctx.stroke();

    drawBox(60,360,W-120,140,'#1a1a3e','#444');

    drawText(`Speed: ${'|'.repeat(Math.round(sd.speed))}  Jump: ${'|'.repeat(Math.round(sd.jumpForce/2))}  Weight: ${'|'.repeat(Math.round(sd.weight*5))}`,W/2,465,11,'#777');
  }
  drawText(gameMode==='local'?'P1: Arrows | P2: A/D | Space/E to confirm':'Arrows to select, Space to confirm',W/2,H-15,11,'#555');
  drawText('ESC to go back',W/2,H-35,11,'#555');
}

  const allStages=gameMode==='training'?[TRAINING_STAGE,...STAGE_DEFS]:STAGE_DEFS;
  const count=allStages.length;const sw=Math.min(170,700/count);

    ctx.save();ctx.beginPath();ctx.rect(x-60,y-70,120,110);ctx.clip();

}

// ===== START FIGHT =====
function startFight(p1Char,p2Char,stageIdx,p2IsCPU=true,cpuDiff=0.5){
  const allStages=gameMode==='training'?[TRAINING_STAGE,...STAGE_DEFS]:STAGE_DEFS;
  const stage=allStages[stageIdx%allStages.length];currentStage=stage;
  const sx1=stage.platforms[0].x+80,sx2=stage.platforms[0].x+stage.platforms[0].w-80;
  fighters=[new Fighter(p1Char,sx1,1,1),new Fighter(p2Char,sx2,-1,2)];
  fighters[1].ai=p2IsCPU?new AIController(cpuDiff):null;
  projectiles=[];activeItems=[];particles=[];plantedBombs=[];
  roundTimer=5400;itemSpawnTimer=300;countdownTimer=180;gameState=S.FIGHTING;
}

// ===== FIGHTER INPUT =====
function handleFighterInput(f,up,down,left,right,attack){
  if(f.state==='hitstun'||f.state==='dead'||countdownTimer>0)return;
  if(f.state!=='attack'){
    if(left){f.vx=-f.def.speed*f.speedMult;f.state=f.grounded?'walk':'jump'}
    else if(right){f.vx=f.def.speed*f.speedMult;f.state=f.grounded?'walk':'jump'}
    else if(f.grounded&&f.state!=='attack')f.state='idle';
  }
  if(up&&f.jumpCount<f.jumps&&f.state!=='attack'){if(!f._jumpHeld){f.vy=-f.def.jumpForce;f.grounded=false;f.jumpCount++;f.state='jump';sfxJump();f._jumpHeld=true}}
  if(!up)f._jumpHeld=false;
  // elytra glide
  if(f.def.passive==='elytra'&&up&&!f.grounded&&f.jumpCount>=f.jumps)f.gliding=true;
  if(!up)f.gliding=false;
  if(down&&!f.grounded)f.vy=Math.min(f.vy+1,12);
  if(attack&&!f._attackHeld){
    let dir='neutral';if(up)dir='up';else if(down)dir='down';else if(left||right)dir='forward';
    f.startAttack(dir);f._attackHeld=true;
  }
  if(!attack)f._attackHeld=false;
}

// ===== MAIN UPDATE =====
function update(){
  if(gameState===S.FIGHTING){
    if(countdownTimer>0){countdownTimer--;return}
    roundTimer--;
    handleFighterInput(fighters[0],keys['ArrowUp'],keys['ArrowDown'],keys['ArrowLeft'],keys['ArrowRight'],keys['Space']);
    if(fighters[1].ai)fighters[1].ai.update(fighters[1],fighters[0],currentStage.platforms);
    else handleFighterInput(fighters[1],keys['KeyW'],keys['KeyS'],keys['KeyA'],keys['KeyD'],keys['KeyE']);
    fighters.forEach((f,i)=>f.update(currentStage.platforms,fighters[1-i],currentStage));
    checkAttackHit(fighters[0],fighters[1]);checkAttackHit(fighters[1],fighters[0]);

    // projectiles
    for(let i=projectiles.length-1;i>=0;i--){
      const p=projectiles[i];p.update();
      if(p.life<=0||p.x<-50||p.x>W+50||p.y>H+50){projectiles.splice(i,1);continue}
      fighters.forEach(f=>{
        if(f!==p.owner&&f.invincible<=0&&Math.abs(p.x-f.x)<20&&Math.abs(p.y-(f.y-25))<30){
          if(p.explosive){sfxExplode();shake(6);spawnParticles(p.x,p.y,'#FF4444',12,5);
            fighters.forEach(ff=>{if(Math.abs(ff.x-p.x)<60&&Math.abs(ff.y-p.y)<50)ff.takeDamage(p.dmg,(ff.x-p.x)*0.3,-5,p.owner)});
          }else{f.takeDamage(p.dmg,p.vx*0.5,-3,p.owner)}
          projectiles.splice(i,1);
        }
      });
    }

    // planted bombs
    for(let i=plantedBombs.length-1;i>=0;i--){
      if(plantedBombs[i].update()){
        const b=plantedBombs[i];sfxExplode();shake(8);spawnParticles(b.x,b.y-8,'#FF4444',20,6);
        fighters.forEach(f=>{if(Math.abs(f.x-b.x)<b.radius&&Math.abs(f.y-b.y)<b.radius)f.takeDamage(b.dmg,(f.x-b.x)*0.3,-6,b.owner)});
        plantedBombs.splice(i,1);
      }
    }

    // items
    itemSpawnTimer--;
    if(itemSpawnTimer<=0&&activeItems.length<3){
      const def=ITEM_DEFS[Math.floor(Math.random()*ITEM_DEFS.length)];
      const plat=currentStage.platforms[Math.floor(Math.random()*currentStage.platforms.length)];
      activeItems.push(new GameItem(plat.x+Math.random()*plat.w,plat.y-60,def));itemSpawnTimer=420+Math.random()*300;
    }
    for(let i=activeItems.length-1;i>=0;i--){
      const item=activeItems[i];item.update(currentStage.platforms);if(item.life<=0){activeItems.splice(i,1);continue}
      fighters.forEach(f=>{
        if(Math.abs(item.x-f.x)<25&&Math.abs(item.y-f.y+15)<30){
          const eff=item.def;
          if(eff.effect==='heal'){f.hp=Math.min(f.maxHp,f.hp+eff.value);spawnParticles(f.x,f.y-20,'#5F5',8,2)}
          if(eff.effect==='speed'){f.speedMult=eff.value;f.effectTimers.speed=eff.duration}
          if(eff.effect==='strength'){f.strengthMult=eff.value;f.effectTimers.strength=eff.duration}
          if(eff.effect==='shield'){f.shielded=true;f.effectTimers.shield=eff.duration}
          if(eff.effect==='teleport'){const ox=fighters.find(o=>o!==f);if(ox){f.x=ox.x+(Math.random()>0.5?60:-60);spawnParticles(f.x,f.y-20,'#9B59B6',12,3)}}
          if(eff.effect==='explosive'){const ox=fighters.find(o=>o!==f);if(ox&&Math.abs(ox.x-item.x)<80)ox.takeDamage(eff.value,(ox.x-item.x)*0.2,-5,f);spawnParticles(item.x,item.y,'#FF4444',15,5);shake(6)}
          sfxItem();activeItems.splice(i,1);
        }
      });
    }

    // death check
    fighters.forEach(f=>{if(f.y>currentStage.deathY||f.x<-100||f.x>W+100)f.hp=0});
    // training: don't let fighters die
    if(gameMode==='training'){fighters.forEach(f=>{if(f.hp<20){f.hp=100;f.damage=0}})}

    let winner=null;
    if(fighters[0].hp<=0&&fighters[1].hp<=0)winner=fighters[0].damage<fighters[1].damage?fighters[0]:fighters[1];
    else if(fighters[0].hp<=0)winner=fighters[1];else if(fighters[1].hp<=0)winner=fighters[0];
    else if(roundTimer<=0)winner=fighters[0].hp>=fighters[1].hp?fighters[0]:fighters[1];
    if(winner){sfxKO();gameState=S.VICTORY;victoryTimer=240;winner.wins++;
      if(winner.playerNum===1){saveData.wins++;if(gameMode==='story')saveData.storyProgress=Math.max(saveData.storyProgress,storyLevel+1);save()}}
    updateParticles();if(shakeTime>0)shakeTime--;else shakeAmount=0;
  }
}

// ===== MAIN DRAW =====
function draw(){
  ctx.save();if(shakeAmount>0&&shakeTime>0)ctx.translate(Math.random()*shakeAmount-shakeAmount/2,Math.random()*shakeAmount-shakeAmount/2);
  if(gameState===S.MENU)drawMainMenu();
  else if(gameState===S.CHAR_SELECT)drawCharSelect();
  else if(gameState===S.STAGE_SELECT)drawStageSelect();
  else if(gameState===S.CREDITS)drawCredits();
  else if(gameState===S.STORY_INTRO)drawStoryIntro();
  else if(gameState===S.PAUSE){drawStage(currentStage);fighters.forEach(f=>f.draw());drawHUD();drawPause()}
  else if(gameState===S.FIGHTING||gameState===S.VICTORY){
    drawStage(currentStage);activeItems.forEach(it=>it.draw());
    plantedBombs.forEach(b=>b.draw());projectiles.forEach(p=>p.draw());
    drawParticles();fighters.forEach(f=>f.draw());drawHUD();drawCountdown();
    if(gameState===S.VICTORY)drawVictory();
  }
  ctx.restore();
}

// ===== MENU NAVIGATION =====
document.addEventListener('keydown',e=>{
  initAudio();const k=e.code;
  if(gameState===S.MENU){
    if(k==='ArrowUp'){menuSelection=(menuSelection-1+5)%5;sfxMenu()}
    if(k==='ArrowDown'){menuSelection=(menuSelection+1)%5;sfxMenu()}
    if(k==='Space'||k==='Enter'){sfxSelect();
      if(menuSelection===0){gameMode='vs_cpu';gameState=S.CHAR_SELECT}
      else if(menuSelection===1){gameMode='local';gameState=S.CHAR_SELECT}
      else if(menuSelection===2){gameMode='story';storyLevel=0;gameState=S.STORY_INTRO}
      else if(menuSelection===3){gameMode='training';gameState=S.CHAR_SELECT}
      else if(menuSelection===4)gameState=S.CREDITS}
  }else if(gameState===S.CHAR_SELECT){
    if(k==='ArrowLeft'){charSelectP1=(charSelectP1-1+charOrder.length)%charOrder.length;sfxMenu()}
    if(k==='ArrowRight'){charSelectP1=(charSelectP1+1)%charOrder.length;sfxMenu()}
    if(gameMode==='local'){if(k==='KeyA'){charSelectP2=(charSelectP2-1+charOrder.length)%charOrder.length;sfxMenu()}if(k==='KeyD'){charSelectP2=(charSelectP2+1)%charOrder.length;sfxMenu()}}
    if(k==='Space'||k==='Enter'){
      const p1Id=charOrder[charSelectP1];if(CHAR_DEFS[p1Id].locked&&!saveData.unlocked.includes(p1Id))return;
      if(gameMode==='local'){const p2Id=charOrder[charSelectP2];if(CHAR_DEFS[p2Id].locked&&!saveData.unlocked.includes(p2Id))return}
      sfxSelect();stageSelect=0;gameState=S.STAGE_SELECT}
    if(k==='Escape'){gameState=S.MENU;sfxMenu()}
  }else if(gameState===S.STAGE_SELECT){
    const allStages=gameMode==='training'?[TRAINING_STAGE,...STAGE_DEFS]:STAGE_DEFS;
    if(k==='ArrowLeft'){stageSelect=(stageSelect-1+allStages.length)%allStages.length;sfxMenu()}
    if(k==='ArrowRight'){stageSelect=(stageSelect+1)%allStages.length;sfxMenu()}
    if(k==='Space'||k==='Enter'){sfxSelect();
      const p1Id=charOrder[charSelectP1];let p2Id=charOrder[charSelectP2];
      if(gameMode!=='local'){const avail=charOrder.filter(c=>!CHAR_DEFS[c].locked||saveData.unlocked.includes(c));p2Id=avail[Math.floor(Math.random()*avail.length)]}
      startFight(p1Id,p2Id,stageSelect,gameMode!=='local',gameMode==='training'?0.2:0.5)}
    if(k==='Escape'){gameState=S.CHAR_SELECT;sfxMenu()}
  }else if(gameState===S.STORY_INTRO){
    if(k==='Space'||k==='Enter'){sfxSelect();startFight(saveData.unlocked[0]||'second_coming',storyOpponents[storyLevel],storyStages[storyLevel],true,0.3+storyLevel*0.1);gameMode='story'}
    if(k==='Escape'){gameState=S.MENU;sfxMenu()}
  }else if(gameState===S.FIGHTING){
    if(k==='Escape'){gameState=S.PAUSE;menuSelection=0;sfxMenu()}
  }else if(gameState===S.PAUSE){
    if(k==='ArrowUp'){menuSelection=(menuSelection-1+2)%2;sfxMenu()}
    if(k==='ArrowDown'){menuSelection=(menuSelection+1)%2;sfxMenu()}
    if(k==='Space'||k==='Enter'){sfxSelect();if(menuSelection===0)gameState=S.FIGHTING;else{gameState=S.MENU;menuSelection=0}}
    if(k==='Escape')gameState=S.FIGHTING;
  }else if(gameState===S.VICTORY){
    if(k==='Space'||k==='Enter'){sfxSelect();
      if(gameMode==='story'){storyLevel++;if(storyLevel>=storyOpponents.length){gameState=S.MENU;menuSelection=0}else gameState=S.STORY_INTRO}
      else{gameState=S.MENU;menuSelection=0}}
  }else if(gameState===S.CREDITS){if(k==='Escape'){gameState=S.MENU;sfxMenu()}}
});

// ===== GAME LOOP =====
function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}
gameLoop();
</script>
