// ===== SOUND =====
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(freq,dur,type='square',vol=0.15){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxHit(){playSound(200,0.1,'sawtooth',0.2)}
function sfxKO(){playSound(100,0.5,'sawtooth',0.3);setTimeout(()=>playSound(80,0.5,'sawtooth',0.2),200)}
function sfxJump(){playSound(400,0.1,'sine',0.1)}
function sfxItem(){playSound(800,0.15,'sine',0.15);setTimeout(()=>playSound(1000,0.15,'sine',0.15),100)}
function sfxSelect(){playSound(600,0.08,'square',0.1)}

// ===== PARTICLES =====
let particles=[];
function spawnParticles(x,y,color,count=8,speed=3){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*speed*(0.5+Math.random()),vy:Math.sin(a)*speed*(0.5+Math.random()),life:30+Math.random()*20,maxLife:50,color,size:2+Math.random()*3});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1;
}

// ===== PROJECTILE CLASS =====
let projectiles=[];
class Projectile{
  constructor(x,y,vx,vy,dmg,kb,owner,color){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.dmg=dmg;this.kb=kb;this.owner=owner;this.color=color;this.life=90;this.size=6;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.1;this.life--}
  draw(){
    ctx.fillStyle=this.color;
    ctx.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size);
    ctx.fillStyle='rgba(255,255,200,0.5)';
    ctx.fillRect(this.x-this.size/2-this.vx,this.y-this.size/2-this.vy,this.size,this.size);
  }
}

// ===== FIGHTER CLASS =====
class Fighter{
  constructor(charId,x,facing,playerNum){
    const def=CHAR_DEFS[charId];
    this.id=charId;this.def=def;this.x=x;this.y=H-200;this.vx=0;this.vy=0;
    this.facing=facing;this.playerNum=playerNum;
    this.hp=100;this.maxHp=100;this.damage=0; // accumulated knockback multiplier
    this.grounded=false;this.jumps=2;this.jumpCount=0;
    this.state='idle'; // idle,walk,jump,fall,attack,hitstun,dead
    this.attackTimer=0;this.attackPhase='';this.currentAttack=null;
    this.hitstunTimer=0;this.invincible=0;
    this.animFrame=0;this.animTimer=0;
    this.combo=0;this.lastHitBy=null;
    this.speedMult=1;this.strengthMult=1;this.shielded=false;
    this.effectTimers={speed:0,strength:0,shield:0};
    this.stocks=3; // for stock mode
    this.wins=0;
    this.walkCycle=0;
  }

  getAttack(dir,inAir){
    const atks=this.def.attacks;
    if(inAir){
      if(dir==='up')return atks.airUp;
      if(dir==='down')return atks.airDown;
      if(dir==='forward')return atks.airForward;
      return atks.airNeutral;
    }
    if(dir==='up')return atks.up;
    if(dir==='down')return atks.down;
    if(dir==='forward')return atks.forward;
    if(dir==='special')return atks.special;
    return atks.neutral;
  }

  startAttack(dir){
    if(this.state==='attack'||this.state==='hitstun')return;
    const atk=this.getAttack(dir,!this.grounded);
    this.currentAttack=atk;
    this.attackTimer=atk.startup+atk.active+atk.recover;
    this.attackPhase='startup';
    this.state='attack';
    playSound(300,0.05,'square',0.08);
  }

  update(platforms,opponent){
    // effect timers
    for(let k in this.effectTimers){
      if(this.effectTimers[k]>0){this.effectTimers[k]--;if(this.effectTimers[k]<=0){
        if(k==='speed')this.speedMult=1;if(k==='strength')this.strengthMult=1;if(k==='shield')this.shielded=false;
      }}
    }
    if(this.invincible>0)this.invincible--;
    // animation
    this.animTimer++;
    if(this.animTimer%6===0)this.animFrame++;

    if(this.state==='hitstun'){
      this.hitstunTimer--;
      if(this.hitstunTimer<=0)this.state='idle';
    }

    if(this.state==='attack'){
      this.attackTimer--;
      const atk=this.currentAttack;
      const elapsed=atk.startup+atk.active+atk.recover-this.attackTimer;
      if(elapsed<atk.startup)this.attackPhase='startup';
      else if(elapsed<atk.startup+atk.active)this.attackPhase='active';
      else this.attackPhase='recover';
      if(this.attackTimer<=0){this.state='idle';this.currentAttack=null;this.attackPhase=''}
    }

    // gravity
    if(!this.grounded){this.vy+=0.6;if(this.vy>15)this.vy=15}

    // move
    this.x+=this.vx;this.y+=this.vy;

    // friction
    if(this.grounded&&this.state!=='hitstun'){this.vx*=0.8}
    else if(this.state==='hitstun'){this.vx*=0.98}
    else{this.vx*=0.92}

    // platform collision
    this.grounded=false;
    for(const p of platforms){
      if(this.vy>=0&&this.y>=p.y&&this.y-this.vy<p.y+5&&this.x>p.x&&this.x<p.x+p.w){
        this.y=p.y;this.vy=0;this.grounded=true;this.jumpCount=0;
      }
    }

    // walk cycle
    if(this.grounded&&Math.abs(this.vx)>0.5)this.walkCycle+=0.15;
    else this.walkCycle=0;

    // auto face opponent
    if(opponent&&this.state!=='attack'&&this.state!=='hitstun'){
      this.facing=opponent.x>this.x?1:-1;
    }
  }

  takeDamage(dmg,kbx,kby,attacker){
    if(this.invincible>0)return;
    const actualDmg=this.shielded?dmg*0.5:dmg;
    this.hp-=actualDmg;
    this.damage+=actualDmg*0.3;
    const kbMult=1+this.damage/80;
    this.vx=kbx*kbMult;
    this.vy=kby*kbMult;
    this.hitstunTimer=Math.floor(10+actualDmg*1.5);
    this.state='hitstun';
    this.invincible=8;
    this.lastHitBy=attacker;
    sfxHit();
    shake(Math.min(actualDmg/3,8));
    spawnParticles(this.x,this.y-20,this.def.color,6,actualDmg/3);
  }

  draw(){
    const f=this;
    const c=f.def.color;
    const blink=f.invincible>0&&Math.floor(f.invincible/2)%2===0;
    if(blink)return;

    ctx.save();
    ctx.translate(f.x,f.y);

    const headY=-50;const bodyTop=-42;const bodyBot=-10;
    const legLen=18;const armLen=16;

    // legs
    const lAngle=Math.sin(f.walkCycle)*0.5;
    ctx.strokeStyle=c;ctx.lineWidth=3;ctx.lineCap='round';

    // left leg
    ctx.beginPath();ctx.moveTo(0,bodyBot);
    ctx.lineTo(-6+Math.sin(lAngle)*legLen,-10+legLen*0.8);
    ctx.lineTo(-8+Math.sin(lAngle)*legLen*1.2,bodyBot+legLen);
    ctx.stroke();
    // right leg
    ctx.beginPath();ctx.moveTo(0,bodyBot);
    ctx.lineTo(6+Math.sin(-lAngle)*legLen,-10+legLen*0.8);
    ctx.lineTo(8+Math.sin(-lAngle)*legLen*1.2,bodyBot+legLen);
    ctx.stroke();

    // body
    ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,bodyTop);ctx.lineTo(0,bodyBot);ctx.stroke();

    // arms + weapon
    const atkAnim=f.state==='attack'?f.attackPhase:'';
    const armBaseY=-38;
    let weapAngle=0,weapX=0,weapY=0;

    if(atkAnim==='active'||atkAnim==='startup'){
      const swingDir=f.currentAttack===f.def.attacks.up||f.currentAttack===f.def.attacks.airUp?-1:
                     f.currentAttack===f.def.attacks.down||f.currentAttack===f.def.attacks.airDown?1:0;
      const swingFwd=f.currentAttack===f.def.attacks.forward||f.currentAttack===f.def.attacks.airForward||
                     f.currentAttack===f.def.attacks.neutral||f.currentAttack===f.def.attacks.airNeutral;

      const progress=atkAnim==='startup'?0.5:1;
      if(swingDir===-1){weapAngle=-Math.PI*0.6*progress;weapX=f.facing*10;weapY=armBaseY-10}
      else if(swingDir===1){weapAngle=Math.PI*0.4*progress;weapX=f.facing*8;weapY=armBaseY+5}
      else{weapAngle=f.facing*Math.PI*0.3*progress;weapX=f.facing*18*progress;weapY=armBaseY}

      // attack arm
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(weapX,weapY);ctx.stroke();
      // weapon
      ctx.save();ctx.translate(weapX,weapY);ctx.rotate(weapAngle);
      ctx.strokeStyle=f.def.weaponColor;ctx.lineWidth=4;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(f.facing*25,-5);ctx.stroke();
      // weapon head
      ctx.fillStyle=f.def.weaponColor;
      if(f.id==='alex'){ctx.fillRect(f.facing*20,-10,8,12)} // axe head
      else if(f.id==='skeleton'){ctx.beginPath();ctx.arc(f.facing*20,-3,5,0,Math.PI*2);ctx.fill()} // bow
      else if(f.id==='creeper'){ctx.fillStyle='#FF4444';ctx.fillRect(f.facing*18,-8,10,10)} // tnt
      ctx.restore();

      // other arm swinging back
      ctx.strokeStyle=c;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.facing*12,armBaseY+8);ctx.stroke();
    } else if(f.state==='hitstun'){
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.vx*2,armBaseY-8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.vx*2+5,armBaseY+5);ctx.stroke();
    } else {
      // idle/walk arms
      const aSwing=Math.sin(f.walkCycle)*0.3;
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(f.facing*12+Math.sin(aSwing)*5,armBaseY+10);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,armBaseY);ctx.lineTo(-f.facing*5-Math.sin(aSwing)*5,armBaseY+12);ctx.stroke();
      // weapon at rest
      ctx.strokeStyle=f.def.weaponColor;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(f.facing*12,armBaseY+10);ctx.lineTo(f.facing*20,armBaseY+22);ctx.stroke();
    }

    // head
    ctx.fillStyle=c;ctx.strokeStyle=c;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,headY,10,0,Math.PI*2);ctx.fill();

    // eyes (white dots facing direction)
    ctx.fillStyle='#fff';
    ctx.fillRect(f.facing*3-2,headY-3,3,3);
    ctx.fillRect(f.facing*6-1,headY-3,3,3);

    // Enderman purple particles
    if(f.id==='enderman'&&Math.random()<0.3){
      spawnParticles(f.x+Math.random()*20-10,f.y-30+Math.random()*20,'#9B59B6',1,1);
    }
    // Blaze flame particles
    if(f.id==='blaze'&&Math.random()<0.4){
      spawnParticles(f.x+Math.random()*16-8,f.y-20+Math.random()*30,'#F39C12',1,0.5);
    }
    // Creeper face
    if(f.id==='creeper'){
      ctx.fillStyle='#000';
      ctx.fillRect(-4,headY-4,3,3);ctx.fillRect(2,headY-4,3,3);
      ctx.fillRect(-3,headY+1,7,4);
    }

    // shield effect
    if(f.shielded){
      ctx.strokeStyle='rgba(100,200,255,0.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,-25,28,0,Math.PI*2);ctx.stroke();
    }

    // speed effect
    if(f.speedMult>1){
      ctx.strokeStyle='rgba(0,191,255,0.3)';ctx.lineWidth=1;
      for(let i=0;i<3;i++){
        ctx.beginPath();ctx.moveTo(-f.facing*(10+i*8),-40+i*10);ctx.lineTo(-f.facing*(15+i*8),-35+i*10);ctx.stroke();
      }
    }

    ctx.restore();
  }
}

// ===== ITEMS IN GAME =====
let activeItems=[];
class GameItem{
  constructor(x,y,def){
    this.x=x;this.y=y;this.def=def;this.vy=0;this.grounded=false;this.life=600;this.bobTimer=0;
  }
  update(platforms){
    if(!this.grounded){this.vy+=0.4;this.y+=this.vy;
      for(const p of platforms){
        if(this.vy>=0&&this.y>=p.y-8&&this.y-this.vy<p.y&&this.x>p.x&&this.x<p.x+p.w){
          this.y=p.y-8;this.vy=0;this.grounded=true;
        }
      }
    }
    this.bobTimer+=0.05;this.life--;
  }
  draw(){
    const bob=Math.sin(this.bobTimer)*3;
    ctx.fillStyle=this.def.color;
    const y=this.y+bob;
    // draw item based on icon type
    if(this.def.icon==='apple'){
      ctx.beginPath();ctx.arc(this.x,y,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4A2';ctx.fillRect(this.x-1,y-12,2,5);
    }else if(this.def.icon==='steak'){
      ctx.beginPath();ctx.ellipse(this.x,y,10,7,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6B3';ctx.fillRect(this.x+5,y-3,3,2);
    }else if(this.def.icon==='potion'){
      ctx.fillRect(this.x-4,y-10,8,14);
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(this.x-3,y-8,3,5);
      ctx.fillStyle='#654';ctx.fillRect(this.x-3,y-13,6,4);
    }else if(this.def.icon==='pearl'){
      ctx.beginPath();ctx.arc(this.x,y,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(this.x-2,y-2,3,0,Math.PI*2);ctx.fill();
    }else if(this.def.icon==='tnt'){
      ctx.fillRect(this.x-8,y-8,16,16);ctx.fillStyle='#FFF';ctx.fillRect(this.x-2,y-12,4,5);
      ctx.fillStyle='#000';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('T',this.x,y+3);
    }else if(this.def.icon==='shield'){
      ctx.beginPath();ctx.moveTo(this.x,y-10);ctx.lineTo(this.x+8,y-5);ctx.lineTo(this.x+6,y+8);
      ctx.lineTo(this.x,y+12);ctx.lineTo(this.x-6,y+8);ctx.lineTo(this.x-8,y-5);ctx.closePath();ctx.fill();
      ctx.fillStyle='#666';ctx.fillRect(this.x-4,y-6,8,10);
    }
    // blinking when about to expire
    if(this.life<120&&Math.floor(this.life/8)%2===0){
      ctx.globalAlpha=0.3;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x,y,12,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }
  }
}

// ===== AI CONTROLLER =====
class AIController{
  constructor(difficulty=0.5){
    this.difficulty=difficulty;this.actionTimer=0;this.action='idle';this.targetX=0;
  }
  update(fighter,opponent,platforms){
    this.actionTimer--;
    if(this.actionTimer>0)return;

    const dx=opponent.x-fighter.x;const dy=opponent.y-fighter.y;
    const dist=Math.abs(dx);const dir=dx>0?1:-1;

    // decision making
    const r=Math.random();
    const aggression=this.difficulty;

    if(fighter.state==='hitstun'){this.actionTimer=5;return}

    // check if near edge
    const nearEdge=fighter.x<100||fighter.x>W-100;

    if(dist<60&&r<aggression*0.8){
      // close range - attack
      const atkR=Math.random();
      if(dy<-30&&atkR<0.3)fighter.startAttack('up');
      else if(dy>30&&atkR<0.3)fighter.startAttack('down');
      else if(atkR<0.5)fighter.startAttack('forward');
      else if(atkR<0.8)fighter.startAttack('neutral');
      else fighter.startAttack('special');
      this.actionTimer=Math.floor(15-aggression*8);
    }else if(dist<150&&r<aggression*0.5){
      // medium range
      if(Math.random()<0.6){
        fighter.vx=dir*fighter.def.speed*fighter.speedMult;
      }else{
        fighter.startAttack('forward');
      }
      this.actionTimer=Math.floor(12-aggression*5);
    }else{
      // far - approach
      if(r<0.7||dist>200){
        fighter.vx=dir*fighter.def.speed*fighter.speedMult*(0.5+aggression*0.5);
      }
      // jump if opponent is above or to avoid attacks
      if((dy<-50||Math.random()<0.15)&&fighter.grounded){
        fighter.vy=-fighter.def.jumpForce;fighter.grounded=false;fighter.jumpCount++;
      }
      this.actionTimer=Math.floor(10-aggression*4);
    }

    // recovery if off stage
    if(fighter.y>H-80&&!fighter.grounded&&fighter.jumpCount<fighter.jumps){
      fighter.vy=-fighter.def.jumpForce;fighter.jumpCount++;
      fighter.vx=fighter.x<W/2?3:-3;
    }

    // dodge incoming attacks
    if(opponent.state==='attack'&&dist<80&&Math.random()<aggression*0.4){
      if(fighter.grounded){fighter.vy=-fighter.def.jumpForce*0.7;fighter.grounded=false;fighter.jumpCount++}
      fighter.vx=-dir*fighter.def.speed;
      this.actionTimer=8;
    }

    // pick up nearby items
    for(const item of activeItems){
      if(Math.abs(item.x-fighter.x)<60&&Math.abs(item.y-fighter.y)<40){
        fighter.vx=(item.x-fighter.x)*0.1;
      }
    }
  }
}

// ===== DRAW HELPERS =====
function drawText(text,x,y,size=16,color='#fff',align='center'){
  ctx.fillStyle=color;ctx.font=`bold ${size}px 'Courier New', monospace`;ctx.textAlign=align;
  // pixel shadow
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText(text,x+2,y+2);
  ctx.fillStyle=color;ctx.fillText(text,x,y);
}

function drawBox(x,y,w,h,fill='#333',border='#555'){
  ctx.fillStyle=fill;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=border;ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
}

function drawHealthBar(x,y,w,hp,maxHp,color,name,damage){
  drawBox(x-2,y-2,w+4,24,'#222','#444');
  const pct=Math.max(0,hp/maxHp);
  // red background
  ctx.fillStyle='#500';ctx.fillRect(x,y,w,20);
  // health
  ctx.fillStyle=color;ctx.fillRect(x,y,w*pct,20);
  // damage indicator
  if(damage>0){
    ctx.fillStyle='rgba(255,100,0,0.5)';
    const dmgW=Math.min(damage/200,1)*w;
    ctx.fillRect(x+w*pct,y,Math.min(dmgW,w-w*pct),20);
  }
  // text
  drawText(`${name}: ${Math.ceil(hp)}%`,x+w/2,y+15,12,'#fff');
}

function drawMinecraftBlock(x,y,w,h,color){
  ctx.fillStyle=color;ctx.fillRect(x,y,w,h);
  // grid lines for blocky look
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  const bs=16;
  for(let bx=x;bx<x+w;bx+=bs){ctx.beginPath();ctx.moveTo(bx,y);ctx.lineTo(bx,y+h);ctx.stroke()}
  for(let by=y;by<y+h;by+=bs){ctx.beginPath();ctx.moveTo(x,by);ctx.lineTo(x+w,by);ctx.stroke()}
}

// ===== COMBAT RESOLUTION =====
function checkAttackHit(attacker,defender){
  if(attacker.state!=='attack'||attacker.attackPhase!=='active')return;
  if(defender.invincible>0)return;
  if(!attacker.currentAttack)return;
  if(attacker.currentAttack._hit)return; // already hit this swing

  const atk=attacker.currentAttack;
  const dx=defender.x-attacker.x;
  const dy=defender.y-attacker.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const inFront=dx*attacker.facing>-20;

  if(dist<atk.range&&(inFront||dist<30)){
    const dmg=atk.dmg*attacker.strengthMult;
    let kbx=attacker.facing*atk.kb*0.8;
    let kby=-atk.kb*0.5;

    // directional knockback
    if(atk===attacker.def.attacks.up||atk===attacker.def.attacks.airUp){kby=-atk.kb;kbx=attacker.facing*2}
    if(atk===attacker.def.attacks.down||atk===attacker.def.attacks.airDown){kby=atk.kb*0.3;kbx=attacker.facing*atk.kb*0.5}

    defender.takeDamage(dmg,kbx,kby,attacker);
    attacker.currentAttack._hit=true;

    // self damage (creeper special)
    if(atk.selfDmg){attacker.hp-=atk.selfDmg;spawnParticles(attacker.x,attacker.y-20,'#FF4444',10,5)}

    // spawn projectile
    if(atk.projectile&&!atk._projSpawned){
      const speed=8;
      projectiles.push(new Projectile(attacker.x+attacker.facing*20,attacker.y-30,
        attacker.facing*speed,atk===attacker.def.attacks.up?-speed:atk===attacker.def.attacks.down?speed*0.5:-1,
        atk.dmg*0.5,atk.kb*0.5,attacker,attacker.def.weaponColor));
      atk._projSpawned=true;
    }

    // teleport (enderman special)
    if(atk.teleport){
      attacker.x=defender.x+attacker.facing*-50;
      spawnParticles(attacker.x,attacker.y-20,'#9B59B6',15,4);
    }
  }
}

  ctx.save();ctx.translate(W/2,H/2-20);ctx.scale(2.5,2.5);
  // head
  ctx.fillStyle=c;ctx.beginPath();ctx.arc(0,-50,10,0,Math.PI*2);ctx.fill();
  // body
  ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,-42);ctx.lineTo(0,-10);ctx.stroke();
  // victory arms raised
  ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(-18,-50);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-38);ctx.lineTo(18,-50);ctx.stroke();
  // weapon held high
  ctx.strokeStyle=winner.def.weaponColor;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(18,-50);ctx.lineTo(25,-70);ctx.stroke();
  // legs
  ctx.strokeStyle=c;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(-8,8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(8,8);ctx.stroke();
  // eyes
  ctx.fillStyle='#fff';ctx.fillRect(-4,-53,3,3);ctx.fillRect(2,-53,3,3);
  ctx.restore();

  // character-specific victory effects
  if(winner.id==='creeper'){
    for(let i=0;i<8;i++){
      const a=Date.now()/200+i*0.8;
      ctx.fillStyle='#FF4444';ctx.fillRect(W/2+Math.cos(a)*80-5,H/2+Math.sin(a)*60-45,10,10);
    }
  }
  if(winner.id==='enderman'){
    for(let i=0;i<12;i++){
      ctx.fillStyle=`rgba(155,89,182,${0.3+Math.sin(Date.now()/300+i)*0.3})`;
      ctx.fillRect(W/2+Math.cos(i)*100-3,H/2-40+Math.sin(Date.now()/400+i*2)*50-3,6,6);
    }
  }
  if(winner.id==='blaze'){
    for(let i=0;i<10;i++){
      const a=Date.now()/150+i*0.6;
      ctx.fillStyle=`hsl(${30+Math.sin(a)*20},100%,50%)`;
      ctx.fillRect(W/2+Math.cos(a)*70-4,H/2+Math.sin(a)*50-50,8,8);
    }
  }
  if(winner.id==='skeleton'){
    // arrows in ground
    for(let i=-2;i<=2;i++){
      ctx.strokeStyle='#BDC3C7';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(W/2+i*40,H/2+60);ctx.lineTo(W/2+i*40+5,H/2+30);ctx.stroke();
    }
  }

  drawText(winner.def.name+' WINS!',W/2,H/2+90,36,c);

  // unique win quotes
  const quotes={
    steve:'The diamond champion!',alex:'Speed kills!',creeper:'Sssssuper explosive!',
    enderman:'Now you see me...',skeleton:'Bullseye!',blaze:'Burn, baby, burn!'
  };
  drawText(quotes[winner.id]||'Victory!',W/2,H/2+125,16,'#aaa');

  victoryTimer--;
  if(victoryTimer<60){
    const a=victoryTimer/60;
    ctx.globalAlpha=a;
    drawText('Press SPACE to continue',W/2,H-40,14,'#888');
    ctx.globalAlpha=1;
  }

  // unlock check for story mode
  if(gameMode==='story'&&winner.playerNum===1){
    if(storyLevel===3&&!saveData.unlocked.includes('skeleton')){
      saveData.unlocked.push('skeleton');save();
      drawText('SKELETON UNLOCKED!',W/2,H/2+160,20,'#5DE8E0');
    }
    if(storyLevel===5&&!saveData.unlocked.includes('blaze')){
      saveData.unlocked.push('blaze');save();
      drawText('BLAZE UNLOCKED!',W/2,H/2+160,20,'#F39C12');
    }
  }
}

function drawCountdown(){
  if(countdownTimer>0){
    const num=Math.ceil(countdownTimer/60);
    const scale=1+(countdownTimer%60)/60*0.5;
    ctx.save();ctx.translate(W/2,H/2);ctx.scale(scale,scale);
    drawText(num>0?num.toString():'FIGHT!',0,15,60,num>0?'#FFD700':'#FF4444');
    ctx.restore();
  }
}

// ===== INITIALIZE FIGHT =====
function startFight(p1Char,p2Char,stageIdx,p2IsCPU=true,cpuDiff=0.5){
  const stage=STAGE_DEFS[stageIdx%STAGE_DEFS.length];
  currentStage=stage;
  const startX1=stage.platforms[0].x+80;
  const startX2=stage.platforms[0].x+stage.platforms[0].w-80;

  fighters=[new Fighter(p1Char,startX1,1,1),new Fighter(p2Char,startX2,-1,2)];
  fighters[1].ai=p2IsCPU?new AIController(cpuDiff):null;

  projectiles=[];activeItems=[];particles=[];
  roundTimer=5400;itemSpawnTimer=300;
  countdownTimer=180; // 3 second countdown
  gameState=STATES.FIGHTING;
}

// ===== INPUT HANDLING FOR FIGHTERS =====
function handleFighterInput(f,up,down,left,right,attack){
  if(f.state==='hitstun'||f.state==='dead')return;
  if(countdownTimer>0)return;

  // movement
  if(f.state!=='attack'){
    if(left){f.vx=-f.def.speed*f.speedMult;f.state=f.grounded?'walk':'jump'}
    else if(right){f.vx=f.def.speed*f.speedMult;f.state=f.grounded?'walk':'jump'}
    else if(f.grounded&&f.state!=='attack'){f.state='idle'}
  }

  // jump
  if(up&&f.jumpCount<f.jumps&&f.state!=='attack'){
    if(!f._jumpHeld){
      f.vy=-f.def.jumpForce;f.grounded=false;f.jumpCount++;f.state='jump';sfxJump();
      f._jumpHeld=true;
    }
  }
  if(!up)f._jumpHeld=false;

  // fast fall
  if(down&&!f.grounded){f.vy=Math.min(f.vy+1,12)}

  // attack
  if(attack&&!f._attackHeld){
    let dir='neutral';
    if(up)dir='up';
    else if(down)dir='down';
    else if(left||right)dir='forward';
    // special: down+down quickly or hold attack
    f.startAttack(dir);
    f._attackHeld=true;
  }
  if(!attack){f._attackHeld=false;if(f.currentAttack)f.currentAttack._hit=false;if(f.currentAttack)f.currentAttack._projSpawned=false}
}

// ===== MAIN UPDATE =====
function update(){
  if(gameState===STATES.FIGHTING){
    if(countdownTimer>0){countdownTimer--;return}

    roundTimer--;

    // P1 input
    handleFighterInput(fighters[0],keys['ArrowUp'],keys['ArrowDown'],keys['ArrowLeft'],keys['ArrowRight'],keys['Space']);
    // P2 input or AI
    if(fighters[1].ai){
      fighters[1].ai.update(fighters[1],fighters[0],currentStage.platforms);
    }else{
      handleFighterInput(fighters[1],keys['KeyW'],keys['KeyS'],keys['KeyA'],keys['KeyD'],keys['KeyE']);
    }

    // update fighters
    fighters.forEach((f,i)=>{
      f.update(currentStage.platforms,fighters[1-i]);
    });

    // combat
    checkAttackHit(fighters[0],fighters[1]);
    checkAttackHit(fighters[1],fighters[0]);

    // projectiles
    for(let i=projectiles.length-1;i>=0;i--){
      const p=projectiles[i];p.update();
      if(p.life<=0||p.x<-50||p.x>W+50||p.y>H+50){projectiles.splice(i,1);continue}
      // hit check
      fighters.forEach(f=>{
        if(f!==p.owner&&f.invincible<=0){
          if(Math.abs(p.x-f.x)<20&&Math.abs(p.y-(f.y-25))<30){
            f.takeDamage(p.dmg,p.vx*0.5,-3,p.owner);
            projectiles.splice(i,1);
          }
        }
      });
    }

    // items
    itemSpawnTimer--;
    if(itemSpawnTimer<=0&&activeItems.length<3){
      const def=ITEM_DEFS[Math.floor(Math.random()*ITEM_DEFS.length)];
      const plat=currentStage.platforms[Math.floor(Math.random()*currentStage.platforms.length)];
      activeItems.push(new GameItem(plat.x+Math.random()*plat.w,plat.y-60,def));
      itemSpawnTimer=420+Math.random()*300;
    }

    for(let i=activeItems.length-1;i>=0;i--){
      const item=activeItems[i];
      item.update(currentStage.platforms);
      if(item.life<=0){activeItems.splice(i,1);continue}

      // pickup
      fighters.forEach(f=>{
        if(Math.abs(item.x-f.x)<25&&Math.abs(item.y-f.y+15)<30){
          const eff=item.def;
          if(eff.effect==='heal'){f.hp=Math.min(f.maxHp,f.hp+eff.value);spawnParticles(f.x,f.y-20,'#5F5',8,2)}
          if(eff.effect==='speed'){f.speedMult=eff.value;f.effectTimers.speed=eff.duration}
          if(eff.effect==='strength'){f.strengthMult=eff.value;f.effectTimers.strength=eff.duration}
          if(eff.effect==='shield'){f.shielded=true;f.effectTimers.shield=eff.duration}
          if(eff.effect==='teleport'){
            const ox=fighters.find(o=>o!==f);
            if(ox){f.x=ox.x+(Math.random()>0.5?60:-60);spawnParticles(f.x,f.y-20,'#9B59B6',12,3)}
          }
          if(eff.effect==='explosive'){
            const ox=fighters.find(o=>o!==f);
            if(ox&&Math.abs(ox.x-item.x)<80&&Math.abs(ox.y-item.y)<60){
              ox.takeDamage(eff.value,(ox.x-item.x)*0.2,-5,f);
            }
            spawnParticles(item.x,item.y,'#FF4444',15,5);shake(6);
          }
          sfxItem();
          activeItems.splice(i,1);
        }
      });
    }

    // death check (fall off stage)
    fighters.forEach(f=>{
      if(f.y>currentStage.deathY||f.x<-100||f.x>W+100){
        f.hp=0;
      }
    });

    // win condition
    let winner=null;
    if(fighters[0].hp<=0&&fighters[1].hp<=0){winner=fighters[0].damage<fighters[1].damage?fighters[0]:fighters[1]}
    else if(fighters[0].hp<=0)winner=fighters[1];
    else if(fighters[1].hp<=0)winner=fighters[0];
    else if(roundTimer<=0)winner=fighters[0].hp>=fighters[1].hp?fighters[0]:fighters[1];

    if(winner){
      sfxKO();
      gameState=STATES.VICTORY;
      victoryTimer=240;
      winner.wins++;
      if(winner.playerNum===1){saveData.wins++;
        if(gameMode==='story')saveData.storyProgress=Math.max(saveData.storyProgress,storyLevel+1);
        save();
      }
    }

    // particles
    updateParticles();

    // screen shake decay
    if(shakeTime>0)shakeTime--;else shakeAmount=0;
  }
}

// ===== MAIN DRAW =====
function draw(){
  ctx.save();
  // screen shake
  if(shakeAmount>0&&shakeTime>0){
    ctx.translate(Math.random()*shakeAmount-shakeAmount/2,Math.random()*shakeAmount-shakeAmount/2);
  }

  if(gameState===STATES.MENU){drawMainMenu()}
  else if(gameState===STATES.CHAR_SELECT){drawCharSelect()}
  else if(gameState===STATES.STAGE_SELECT){drawStageSelect()}
  else if(gameState===STATES.CREDITS){drawCredits()}
  else if(gameState===STATES.STORY_INTRO){drawStoryIntro()}
  else if(gameState===STATES.PAUSE){
    drawStage(currentStage);fighters.forEach(f=>f.draw());drawHUD();drawPause();
  }
  else if(gameState===STATES.FIGHTING||gameState===STATES.VICTORY){
    drawStage(currentStage);
    activeItems.forEach(it=>it.draw());
    projectiles.forEach(p=>p.draw());
    drawParticles();
    fighters.forEach(f=>f.draw());
    drawHUD();
    drawCountdown();
    if(gameState===STATES.VICTORY)drawVictory();
  }

  ctx.restore();
}

// ===== MENU NAVIGATION =====
document.addEventListener('keydown',e=>{
  initAudio();
  const k=e.code;

  if(gameState===STATES.MENU){
    if(k==='ArrowUp'){menuSelection=(menuSelection-1+5)%5;sfxMenu()}
    if(k==='ArrowDown'){menuSelection=(menuSelection+1)%5;sfxMenu()}
    if(k==='Space'||k==='Enter'){
      sfxSelect();
      if(menuSelection===0){gameMode='vs_cpu';gameState=STATES.CHAR_SELECT}
      else if(menuSelection===1){gameMode='local';gameState=STATES.CHAR_SELECT}
      else if(menuSelection===2){gameMode='story';storyLevel=0;gameState=STATES.STORY_INTRO}
      else if(menuSelection===3){gameMode='training';gameState=STATES.CHAR_SELECT}
      else if(menuSelection===4){gameState=STATES.CREDITS}
    }
  }
  else if(gameState===STATES.CHAR_SELECT){
    const maxIdx=charOrder.length-1;
    if(k==='ArrowLeft'){charSelectP1=(charSelectP1-1+charOrder.length)%charOrder.length;sfxMenu()}
    if(k==='ArrowRight'){charSelectP1=(charSelectP1+1)%charOrder.length;sfxMenu()}
    if(gameMode==='local'){
      if(k==='KeyA'){charSelectP2=(charSelectP2-1+charOrder.length)%charOrder.length;sfxMenu()}
      if(k==='KeyD'){charSelectP2=(charSelectP2+1)%charOrder.length;sfxMenu()}
    }
    if(k==='Space'||k==='Enter'){
      const p1Id=charOrder[charSelectP1];
      const p1Def=CHAR_DEFS[p1Id];
      if(p1Def.locked&&!saveData.unlocked.includes(p1Id))return;
      if(gameMode==='local'){
        const p2Id=charOrder[charSelectP2];
        const p2Def=CHAR_DEFS[p2Id];
        if(p2Def.locked&&!saveData.unlocked.includes(p2Id))return;
      }
      sfxSelect();
      gameState=STATES.STAGE_SELECT;
    }
    if(k==='Escape'){gameState=STATES.MENU;sfxMenu()}
  }
  else if(gameState===STATES.STAGE_SELECT){
    if(k==='ArrowLeft'){stageSelect=(stageSelect-1+STAGE_DEFS.length)%STAGE_DEFS.length;sfxMenu()}
    if(k==='ArrowRight'){stageSelect=(stageSelect+1)%STAGE_DEFS.length;sfxMenu()}
    if(k==='Space'||k==='Enter'){
      sfxSelect();
      const p1Id=charOrder[charSelectP1];
      let p2Id=charOrder[charSelectP2];
      if(gameMode==='vs_cpu'||gameMode==='training'){
        // random CPU character
        const available=charOrder.filter(c=>!CHAR_DEFS[c].locked||saveData.unlocked.includes(c));
        p2Id=available[Math.floor(Math.random()*available.length)];
      }
      const diff=gameMode==='training'?0.2:0.5;
      startFight(p1Id,p2Id,stageSelect,gameMode!=='local',diff);
    }
    if(k==='Escape'){gameState=STATES.CHAR_SELECT;sfxMenu()}
  }
  else if(gameState===STATES.STORY_INTRO){
    if(k==='Space'||k==='Enter'){
      sfxSelect();
      const p1Id=charOrder[charSelectP1]||'steve';
      const p2Id=storyOpponents[storyLevel];
      const diff=0.3+storyLevel*0.12;
      startFight(saveData.unlocked[0]||'steve',p2Id,storyLevel%STAGE_DEFS.length,true,diff);
      gameMode='story';
    }
    if(k==='Escape'){gameState=STATES.MENU;sfxMenu()}
  }
  else if(gameState===STATES.FIGHTING){
    if(k==='Escape'){prevState=STATES.FIGHTING;gameState=STATES.PAUSE;menuSelection=0;sfxMenu()}
  }
  else if(gameState===STATES.PAUSE){
    if(k==='ArrowUp'){menuSelection=(menuSelection-1+2)%2;sfxMenu()}
    if(k==='ArrowDown'){menuSelection=(menuSelection+1)%2;sfxMenu()}
    if(k==='Space'||k==='Enter'){
      sfxSelect();
      if(menuSelection===0)gameState=STATES.FIGHTING;
      else{gameState=STATES.MENU;menuSelection=0}
    }
    if(k==='Escape'){gameState=STATES.FIGHTING}
  }
  else if(gameState===STATES.VICTORY){
    if(k==='Space'||k==='Enter'){
      sfxSelect();
      if(gameMode==='story'){
        storyLevel++;
        if(storyLevel>=storyOpponents.length){
          // story complete
          gameState=STATES.MENU;menuSelection=0;
        }else{
          gameState=STATES.STORY_INTRO;
        }
      }else{
        gameState=STATES.MENU;menuSelection=0;
      }
    }
  }
  else if(gameState===STATES.CREDITS){
    if(k==='Escape'){gameState=STATES.MENU;sfxMenu()}
  }
});

// ===== TRAINING MODE FEATURES =====
// In training, opponent doesn't die and HP resets
function trainingUpdate(){
  if(gameMode==='training'&&fighters[1]){
    if(fighters[1].hp<30)fighters[1].hp=100;
    fighters[1].damage=0;
  }
}

// ===== GAME LOOP =====
function gameLoop(){
  update();
  if(gameMode==='training')trainingUpdate();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
